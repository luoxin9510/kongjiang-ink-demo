<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0B0B0E">
<title>控江往事 · 静默深渊</title>
<style>
:root {
  --bg: #0B0B0E;
  --fg: #E8E0CC;
  --dim: #8A8478;
  --dim2: #5A554C;
  --accent: #B83A3A;
  --gold: #C9A33A;
  --green: #6BAA5C;
  --panel: #16161B;
  --panel-hover: #22222A;
  --panel-2: #1F1F26;
  --border: #2A2A33;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: var(--bg);
  color: var(--fg);
  font-family: "Noto Serif SC", "Source Han Serif SC", "Songti SC", "STSong", "SimSun", serif;
  font-size: 17px;
  line-height: 1.85;
  -webkit-font-smoothing: antialiased;
}
html { height: 100%; overscroll-behavior: none; }
body {
  height: 100%;
  overflow: hidden;
  display: flex; flex-direction: column;
  padding: env(safe-area-inset-top) env(safe-area-inset-right) 0 env(safe-area-inset-left);
}
#game {
  flex: 1 1 0;
  min-height: 0;
  display: flex; flex-direction: column;
}
#game.hidden { display: none; }

/* ============ Title screen ============ */
.title-screen {
  position: fixed; inset: 0;
  background: var(--bg);
  z-index: 100;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px 24px;
  overflow-y: auto;
}
.title-screen h1 {
  font-size: 36px; font-weight: 400;
  letter-spacing: 0.4em; margin: 0;
  color: var(--accent);
  text-shadow: 0 0 30px rgba(184, 58, 58, 0.3);
}
.title-screen .subtitle {
  font-size: 16px; color: var(--dim);
  letter-spacing: 0.3em;
  margin: 8px 0 40px;
}
.title-screen .acts {
  display: flex; flex-direction: column; gap: 12px;
  width: 100%; max-width: 360px;
}
.title-screen .acts button {
  appearance: none;
  background: var(--panel);
  color: var(--fg);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px 20px;
  font-family: inherit;
  font-size: 16px;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
  text-align: left;
  -webkit-tap-highlight-color: transparent;
}
.title-screen .acts button:active,
.title-screen .acts button:hover {
  background: var(--panel-hover);
  border-color: var(--accent);
}
.title-screen .acts button .meta {
  display: block;
  font-size: 13px; color: var(--dim);
  margin-top: 4px;
}
.title-screen .acts button.disabled,
.title-screen .acts button:disabled {
  opacity: 0.4; cursor: not-allowed;
}
.title-screen .acts button:disabled:hover { background: var(--panel); border-color: var(--border); }
.title-screen .acts button.primary { letter-spacing: 0.04em; }

/* ============ Chapter Select Modal ============ */
.modal-scrim {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(3px);
  display: flex; align-items: center; justify-content: center;
  padding: 16px env(safe-area-inset-right) 16px env(safe-area-inset-left);
  padding-top: calc(env(safe-area-inset-top) + 16px);
  padding-bottom: calc(env(safe-area-inset-bottom) + 16px);
}
.modal-scrim[hidden] { display: none; }
.modal-card {
  background: var(--panel-2);
  border: 1px solid var(--border);
  border-radius: 16px;
  width: 100%; max-width: 420px;
  max-height: 100%;
  display: flex; flex-direction: column;
  overflow: hidden;
}
.modal-header {
  flex: 0 0 auto;
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 18px;
  border-bottom: 1px solid var(--border);
  font-size: 16px; letter-spacing: 0.1em;
}
.modal-close {
  appearance: none; background: transparent; border: none;
  color: var(--dim); font-size: 18px; cursor: pointer;
  padding: 4px 8px;
  -webkit-tap-highlight-color: transparent;
}
.modal-close:hover { color: var(--fg); }
.modal-body {
  flex: 1 1 auto; min-height: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 14px 18px 8px;
  display: flex; flex-direction: column; gap: 10px;
}
.modal-footer {
  flex: 0 0 auto;
  padding: 8px 18px 14px;
  font-size: 11px;
  color: var(--dim2);
  text-align: center;
  letter-spacing: 0.08em;
}
.chapter-item {
  appearance: none;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  font-family: inherit;
  font-size: 15px;
  color: var(--fg);
  text-align: left;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
  -webkit-tap-highlight-color: transparent;
  display: flex; flex-direction: column; gap: 4px;
}
.chapter-item:hover, .chapter-item:active {
  background: var(--panel-hover); border-color: var(--accent);
}
.chapter-item:disabled {
  opacity: 0.45; cursor: not-allowed;
}
.chapter-item:disabled:hover { background: var(--panel); border-color: var(--border); }
.chapter-item .meta { font-size: 12px; color: var(--dim); }
.chapter-item.done { border-color: var(--gold, #c9a96e); }
.chapter-item.done::before { content: "✓ "; color: var(--gold, #c9a96e); }
.chapter-item.locked .meta { color: var(--accent); }
.title-screen .extras {
  margin-top: 32px;
  display: flex; flex-direction: column; gap: 14px;
  width: 100%; max-width: 360px;
  font-size: 14px; color: var(--dim);
}
.title-screen .extras details {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 14px;
}
.title-screen .extras summary {
  cursor: pointer; font-size: 13px;
  list-style: none;
  padding: 4px 0;
}
.title-screen .extras summary::-webkit-details-marker { display: none; }
.title-screen .extras summary::before { content: "▸ "; }
.title-screen .extras details[open] summary::before { content: "▾ "; }
.title-screen .extras details[open] { padding-bottom: 14px; }
.title-screen .extras input[type=text],
.title-screen .extras input[type=number] {
  background: var(--bg); color: var(--fg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 10px;
  font-family: inherit; font-size: 14px;
  width: 100%;
  margin-top: 6px;
}
.title-screen .extras .row {
  display: flex; gap: 8px; align-items: center;
  font-size: 13px; padding: 8px 0;
}
.title-screen .ach-link {
  appearance: none; background: transparent;
  color: var(--dim); border: 1px solid var(--border);
  border-radius: 6px; padding: 10px;
  font-family: inherit; font-size: 14px;
  cursor: pointer; text-align: center;
}
.title-screen .ach-link:hover { color: var(--fg); border-color: var(--accent); }
.title-screen .ach-link b { color: var(--gold); }
.title-screen .langs {
  margin-top: 24px; font-size: 13px;
}
.title-screen .langs a { color: var(--dim); margin: 0 8px; text-decoration: none; }
.title-screen .langs a:hover { color: var(--fg); }

/* ============ PC Select screen ============ */
.pc-select-screen {
  position: fixed; inset: 0;
  background: var(--bg);
  z-index: 100;
  display: flex; flex-direction: column;
  align-items: center;
  padding: 32px 24px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.pc-select-screen[hidden] { display: none; }
.pc-select-screen h2 {
  font-size: 24px; font-weight: 400;
  letter-spacing: 0.3em;
  color: var(--accent);
  margin: 0 0 4px;
  text-shadow: 0 0 20px rgba(184, 58, 58, 0.25);
}
.pc-select-screen .pc-subtitle {
  font-size: 13px; color: var(--dim);
  letter-spacing: 0.2em;
  margin: 0 0 28px;
}
.pc-select-cards {
  display: flex; flex-direction: column; gap: 12px;
  width: 100%; max-width: 360px;
}
.pc-select-card {
  appearance: none;
  background: var(--panel);
  color: var(--fg);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 18px 14px;
  font-family: inherit;
  font-size: 15px;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
  text-align: left;
  -webkit-tap-highlight-color: transparent;
  display: flex; flex-direction: column; gap: 6px;
}
.pc-select-card:active,
.pc-select-card:hover {
  background: var(--panel-hover);
  border-color: var(--accent);
}
.pc-select-card .pc-name {
  font-size: 18px; letter-spacing: 0.08em;
  color: var(--gold);
  font-weight: 500;
}
.pc-select-card .pc-fullname {
  font-size: 11px; color: var(--dim2);
  letter-spacing: 0.1em;
  margin-top: -2px;
}
.pc-select-card .pc-occupation {
  font-size: 13px; color: var(--dim);
}
.pc-select-card .pc-stats {
  font-size: 12px; color: var(--dim);
  letter-spacing: 0.05em;
  font-family: "Source Code Pro", "Consolas", monospace;
}
.pc-select-card .pc-hook {
  font-size: 14px;
  color: var(--fg);
  font-style: italic;
  border-left: 2px solid var(--accent);
  padding-left: 10px;
  margin: 4px 0;
}
.pc-select-card .pc-cta {
  font-size: 13px; color: var(--dim);
  letter-spacing: 0.1em;
  margin-top: 4px;
}
.pc-select-back {
  appearance: none;
  background: transparent;
  color: var(--dim);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 20px;
  font-family: inherit;
  font-size: 13px;
  cursor: pointer;
  margin-top: 24px;
  -webkit-tap-highlight-color: transparent;
}
.pc-select-back:hover { color: var(--fg); border-color: var(--accent); }

/* ============ HUD ============ */
header.hud {
  flex: 0 0 auto;
  padding: 8px 14px;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  color: var(--dim);
  display: flex;
  flex-wrap: wrap;
  gap: 4px 10px;
  align-items: center;
  background: rgba(11, 11, 14, 0.95);
  backdrop-filter: blur(8px);
  position: sticky; top: 0; z-index: 10;
}
.stat { white-space: nowrap; position: relative; }
.stat b { color: var(--fg); font-weight: 500; }
.stat.warn b { color: var(--accent); }
.pc-chip {
  appearance: none;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--fg);
  border-radius: 6px;
  padding: 4px 9px 4px 7px;
  font-family: inherit;
  font-size: 12px;
  cursor: pointer;
  display: inline-flex; align-items: center; gap: 4px;
  -webkit-tap-highlight-color: transparent;
  transition: border-color 0.15s, background 0.15s;
}
.pc-chip:hover, .pc-chip:active { border-color: var(--accent); background: var(--panel); }
.pc-chip .icon { font-size: 11px; opacity: 0.7; }
.pc-chip b { color: var(--fg); font-weight: 500; }
.lang {
  margin-left: auto;
  color: var(--dim);
  text-decoration: none;
  border: 1px solid var(--border);
  padding: 2px 8px;
  border-radius: 6px;
  font-size: 12px;
}
.lang:hover { color: var(--fg); border-color: var(--accent); }
.ecology-bar {
  display: inline-flex; gap: 1px; vertical-align: middle;
  margin-left: 2px;
}
.ecology-bar .seg {
  width: 8px; height: 8px; border-radius: 1px;
  background: var(--dim2);
}
.ecology-bar .seg.on { background: var(--gold); }
.ecology-bar .seg.full { background: var(--accent); }

/* Floating delta */
.delta-pop {
  position: absolute;
  bottom: 100%; left: 50%;
  transform: translateX(-50%);
  font-size: 13px;
  font-weight: 600;
  pointer-events: none;
  animation: deltaFly 800ms ease-out forwards;
  z-index: 20;
}
.delta-pop.up { color: var(--accent); }
.delta-pop.down { color: var(--green); }
@keyframes deltaFly {
  0%   { opacity: 0; transform: translate(-50%, 0); }
  20%  { opacity: 1; }
  100% { opacity: 0; transform: translate(-50%, -28px); }
}

/* SAN vignette */
.vignette {
  position: fixed; inset: 0;
  pointer-events: none;
  background: radial-gradient(ellipse at center, transparent 30%, rgba(184, 58, 58, 0.55) 100%);
  opacity: 0; z-index: 5;
}
.vignette.flash { animation: sanFlash 800ms ease-out; }
@keyframes sanFlash {
  0%   { opacity: 0; }
  20%  { opacity: 1; }
  100% { opacity: 0; }
}

/* Achievement toast */
.ach-toast {
  position: fixed;
  top: calc(env(safe-area-inset-top) + 16px);
  left: 50%; transform: translateX(-50%) translateY(-12px);
  background: var(--panel);
  border: 1px solid var(--gold);
  border-radius: 10px;
  padding: 10px 16px;
  display: flex; align-items: center; gap: 10px;
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  max-width: 90vw;
  animation: toastIn 0.3s ease-out forwards, toastOut 0.4s 2.1s ease-in forwards;
}
.ach-toast .icon { font-size: 22px; }
.ach-toast .body .name { font-size: 14px; font-weight: 600; color: var(--gold); }
.ach-toast .body .desc { font-size: 12px; color: var(--dim); }
@keyframes toastIn { to { opacity: 1; transform: translateX(-50%) translateY(0); } }
@keyframes toastOut { to { opacity: 0; transform: translateX(-50%) translateY(-12px); } }

/* ============ Story ============ */
main {
  flex: 1 1 0;
  min-height: 0;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  touch-action: pan-y;
  padding: 18px 18px 8px;
  max-width: 720px; width: 100%;
  margin: 0 auto;
  /* iOS Safari iframe: force own scroll layer */
  transform: translateZ(0);
  -webkit-transform: translateZ(0);
}
#story p {
  margin: 0 0 1em 0;
  animation: fadeIn 0.6s ease-out;
}
#story p.speaker {
  color: var(--dim);
  font-size: 13px;
  margin-bottom: 0.2em;
  letter-spacing: 0.05em;
}
#story p.scene {
  color: var(--dim);
  font-size: 12px;
  font-style: italic;
  border-left: 2px solid var(--border);
  padding-left: 10px;
  margin: 1.4em 0 0.8em 0;
}
#story p.act {
  color: var(--accent);
  font-size: 13px;
  text-align: center;
  letter-spacing: 0.3em;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  padding: 0.6em 0;
  margin: 1.6em 0;
}
#story p.dice {
  font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  color: var(--dim);
  font-size: 13px;
  margin: 0.4em 0;
  letter-spacing: 0.02em;
}
#story p.dice.fail { color: #B07070; }
#story p.dice.fumble { color: var(--accent); font-weight: 600; }
#story p.dice.crit { color: var(--gold); font-weight: 600; }
#story p.end {
  text-align: center;
  font-weight: 600;
  font-size: 19px;
  margin: 2em 0 0.4em;
  letter-spacing: 0.2em;
  color: var(--accent);
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: none; }
}

/* ============ Choices ============ */
nav#choices {
  flex: 0 1 auto;
  max-height: 50vh; max-height: 50dvh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  touch-action: pan-y;
  padding: 12px 18px calc(env(safe-area-inset-bottom) + 16px);
  max-width: 720px; width: 100%;
  margin: 0 auto;
  display: flex; flex-direction: column; gap: 10px;
  border-top: 1px solid var(--border);
  background: var(--bg);
}
nav#choices button {
  appearance: none;
  background: var(--panel);
  color: var(--fg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  font-family: inherit;
  font-size: 16px;
  line-height: 1.5;
  text-align: left;
  min-height: 48px;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
  -webkit-tap-highlight-color: transparent;
}
@media (max-width: 600px) {
  nav#choices { gap: 6px; padding-top: 8px; max-height: 42%; }
  nav#choices button {
    padding: 9px 12px;
    font-size: 14px;
    line-height: 1.35;
    min-height: 40px;
    border-radius: 8px;
  }
  nav#choices button.continue { font-size: 18px; padding: 8px; }
}
nav#choices button:active,
nav#choices button:hover {
  background: var(--panel-hover);
  border-color: var(--accent);
}
nav#choices button.continue {
  text-align: center;
  font-size: 22px;
  letter-spacing: 0.4em;
  padding: 12px;
  color: var(--accent);
}
nav#choices .restart, nav#choices .next-act {
  background: transparent;
  border-color: var(--accent);
  color: var(--accent);
  text-align: center;
  font-weight: 600;
}

/* ============ Bottom sheet ============ */
.scrim {
  position: fixed; inset: 0;
  background: rgba(0, 0, 0, 0.55);
  backdrop-filter: blur(2px);
  z-index: 50; opacity: 0; pointer-events: none;
  transition: opacity 0.25s;
}
.sheet {
  position: fixed;
  left: 0; right: 0; bottom: 0;
  max-width: 720px; margin: 0 auto;
  background: var(--panel-2);
  border-radius: 18px 18px 0 0;
  border-top: 1px solid var(--border);
  z-index: 51;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(.2,.7,.2,1);
  max-height: 85vh; max-height: 85dvh;
  display: flex; flex-direction: column;
  padding-bottom: env(safe-area-inset-bottom);
}
.sheet.open { transform: none; }
.scrim.open { opacity: 1; pointer-events: auto; }
.sheet .handle {
  width: 40px; height: 4px;
  background: var(--dim2);
  border-radius: 2px;
  margin: 8px auto 4px;
  flex: 0 0 auto;
}
.sheet .tabs {
  display: flex; gap: 0;
  border-bottom: 1px solid var(--border);
  flex: 0 0 auto;
}
.sheet .tabs button {
  appearance: none; background: transparent; border: none;
  border-bottom: 2px solid transparent;
  color: var(--dim);
  font-family: inherit; font-size: 13px;
  padding: 12px 8px; flex: 1; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.sheet .tabs button.active {
  color: var(--fg);
  border-bottom-color: var(--accent);
}
.sheet .tab-content {
  overflow-y: auto;
  padding: 14px 18px 24px;
  -webkit-overflow-scrolling: touch;
  flex: 1 1 auto;
}
.sheet .tab-content.hidden { display: none; }

/* ============ Clues tab ============ */
.awareness-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
.awareness-item {
  display: flex; align-items: flex-start; gap: 8px;
  font-size: 13px; line-height: 1.5;
  padding: 6px 0;
}
.awareness-item .dot {
  flex: 0 0 auto;
  width: 10px; height: 10px; border-radius: 50%;
  margin-top: 5px;
  background: var(--border);
}
.awareness-item.unlocked .dot { background: var(--accent); box-shadow: 0 0 8px rgba(184,58,58,0.5); }
.awareness-item .label {
  flex: 0 0 auto; font-weight: 500; min-width: 70px;
}
.awareness-item.locked .label { color: var(--dim2); }
.awareness-item .desc { color: var(--dim); flex: 1 1 auto; }
.awareness-item.locked .desc { color: var(--dim2); }

.ecology-detail {
  margin-bottom: 12px;
  padding: 12px; background: var(--panel); border-radius: 8px;
}
.ecology-bar-detail {
  display: flex; gap: 4px; margin-bottom: 8px;
}
.ecology-tick {
  flex: 1 1 0; height: 14px; border-radius: 3px;
  background: var(--border);
}
.ecology-tick.filled { background: var(--accent); }
.ecology-current {
  font-size: 13px; line-height: 1.5;
  color: var(--fg); margin-top: 8px;
}
.ecology-current .level-label { color: var(--accent); font-weight: 500; }

.npc-list { display: flex; flex-direction: column; gap: 8px; }
.npc-card {
  display: flex; gap: 10px;
  padding: 10px 12px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px;
}
.npc-card .icon { font-size: 24px; line-height: 1; }
.npc-card .body { flex: 1 1 auto; min-width: 0; }
.npc-card .name { font-size: 14px; font-weight: 500; }
.npc-card .role { font-size: 12px; color: var(--dim); margin-top: 1px; }
.npc-card .status { font-size: 11px; color: var(--dim2); margin-top: 4px; line-height: 1.4; }
.npc-card.infected { border-color: rgba(184,58,58,0.6); }
.npc-card.infected .name::after { content: " · 已感染"; color: var(--accent); font-size: 11px; font-weight: normal; }
.npc-empty { color: var(--dim2); font-size: 12px; padding: 8px 0; font-style: italic; }

/* ============ Map tab ============ */
.map-meta {
  font-size: 13px; color: var(--dim); margin-bottom: 14px;
  padding-bottom: 8px; border-bottom: 1px solid var(--border);
}
.map-meta #map-current { color: var(--fg); font-weight: 500; }
.map-floors { display: flex; flex-direction: column; gap: 10px; }
.map-floor {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 8px 0;
}
.map-floor .floor-label {
  flex: 0 0 auto;
  width: 32px;
  font-family: var(--mono, ui-monospace, monospace);
  font-size: 13px; font-weight: 600;
  color: var(--dim);
  text-align: center;
  padding-top: 4px;
}
.map-floor .rooms {

  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
  box-shadow: 0 0 12px rgba(184,58,58,0.5);
}

.sheet h2 { font-size: 18px; font-weight: 600; margin: 4px 0 2px; }

.stats-grid {

  font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  font-size: 14px;
}
.stats-grid .pair { display: flex; justify-content: space-between; padding: 4px 8px; background: var(--panel); border-radius: 6px; }
.stats-grid .pair span:first-child { color: var(--dim); }
.stats-grid .pair span:last-child { color: var(--fg); font-weight: 600; }
.derived-grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 6px 12px;
  font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  font-size: 14px;
}
.derived-grid .pair { display: flex; justify-content: space-between; padding: 6px 10px; background: var(--panel); border-radius: 6px; }
.derived-grid .pair.live { border-left: 2px solid var(--accent); }
.derived-grid .pair span:first-child { color: var(--dim); }
.skills-list { display: flex; flex-direction: column; gap: 4px; font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; font-size: 14px; }

.notes { font-size: 14px; line-height: 1.7; color: var(--fg); }

}

}
.inventory-list .item .icon { font-size: 18px; }
.inventory-list .empty { color: var(--dim); font-style: italic; padding: 14px 0; text-align: center; }

  background: var(--panel);
  border-radius: 8px;
  padding: 10px 12px;
  margin-bottom: 8px;
  font-size: 14px;
  border-left: 2px solid var(--border);
}
.log-entry .head {
  display: flex; justify-content: space-between; align-items: center;
  font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  font-size: 12px;
  color: var(--dim);
  margin-bottom: 3px;
}
.log-entry .skill { font-weight: 600; color: var(--fg); font-size: 14px; }
.log-entry .res { font-size: 12px; }
.log-entry .res.success { color: var(--green); }
.log-entry .res.fail { color: #B07070; }
.log-entry .res.fumble { color: var(--accent); font-weight: 600; }
.log-entry .res.crit { color: var(--gold); font-weight: 600; }
.log-entry .outcome { color: var(--fg); margin-top: 4px; line-height: 1.6; }
.log-entry.fumble { background: rgba(184, 58, 58, 0.08); border-left-color: var(--accent); }
.log-entry.crit { background: rgba(201, 163, 58, 0.08); border-left-color: var(--gold); }
.log-empty { color: var(--dim); font-style: italic; text-align: center; padding: 30px 10px; }

/* Companion cards */
.comp-card {
  background: var(--panel);
  border-radius: 8px;
  padding: 10px 14px;
  margin-bottom: 10px;
}
.comp-card summary {
  display: flex; justify-content: space-between; align-items: center;
  cursor: pointer; list-style: none;
  padding: 4px 0;
}
.comp-card summary::-webkit-details-marker { display: none; }
.comp-card summary .name { font-weight: 600; font-size: 15px; }
.comp-card summary .meta {

}
.comp-card[open] summary { margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.comp-card .body { font-size: 13px; line-height: 1.6; }

/* Achievements */
.ach-summary {
  font-size: 13px; color: var(--dim);
  text-align: center;
  padding: 6px 0 12px;
}
.ach-summary b { color: var(--gold); font-size: 16px; }
.ach-list { display: flex; flex-direction: column; gap: 6px; }
.ach-item {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 10px 12px;
  background: var(--panel);
  border-radius: 8px;
  border-left: 2px solid var(--border);
  font-size: 13px;
}
.ach-item.unlocked { border-left-color: var(--gold); }
.ach-item.locked { opacity: 0.5; }
.ach-item .icon { font-size: 22px; flex: 0 0 auto; }
.ach-item .body { flex: 1; min-width: 0; }
.ach-item .name {
  font-weight: 600; font-size: 14px;
  color: var(--fg); margin-bottom: 2px;
}
.ach-item.unlocked .name { color: var(--gold); }
.ach-item.locked .name { color: var(--dim); }
.ach-item .desc { color: var(--dim); font-size: 12px; line-height: 1.5; }
.ach-item .progress {
  margin-top: 4px;

  overflow: hidden;

.ach-item .progress .fill { height: 100%; background: var(--gold); transition: width 0.4s; }
.ach-item .meta {
  font-size: 11px; color: var(--dim2);

  margin-top: 2px;
}

.error { color: var(--accent); padding: 20px; text-align: center; font-size: 14px; }
.hidden { display: none !important; }

</head>

// ============================================================
// localStorage helpers
// ============================================================
function loadSave() {
  try { return JSON.parse(localStorage.getItem(SAVE_KEY)); } catch { return null; }
}
function setSave(data) { localStorage.setItem(SAVE_KEY, JSON.stringify(data)); }
function clearSave() {
  localStorage.removeItem(SAVE_KEY);
  lastSavedScene = null;
}
function loadAchievements() {
  try { return JSON.parse(localStorage.getItem(ACH_KEY)) || { unlocked: {} }; }
  catch { return { unlocked: {} }; }
}
function saveAchievements(d) { localStorage.setItem(ACH_KEY, JSON.stringify(d)); }
function loadChapterProgress() {
  try {
    const p = JSON.parse(localStorage.getItem(CHAPTER_KEY));
    return p || { 0: "none", 1: "none", 2: "none", 3: "none" };
  } catch { return { 0: "none", 1: "none", 2: "none", 3: "none" }; }
}
function saveChapterProgress(p) { localStorage.setItem(CHAPTER_KEY, JSON.stringify(p)); }
function markChapterDone(act) {
  const p = loadChapterProgress();
  if (p[act] !== "done") {
    p[act] = "done";
    saveChapterProgress(p);
  }
}
function isDevMode() {
  return new URLSearchParams(location.search).get("dev") === "1";
}
function isChapterUnlocked(act) {
  if (isDevMode()) return true;
  if (act === 0) return true;
  return loadChapterProgress()[act - 1] === "done";
}

// Write a v2 checkpoint of current ink state at scene boundary
function saveCheckpoint(sceneLabel) {
  if (!story) return;
  try {
    const data = {
      v: SAVE_SCHEMA_VERSION,
      act: currentAct,
      knot: story.state.currentPathString || "",
      state_json: story.state.ToJson(),
      ts: Date.now(),
      scene_label: sceneLabel || "",
    };
    setSave(data);
  } catch (e) { console.warn("saveCheckpoint failed:", e); }
}

function escapeHTML(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function appendParagraph(text, cls) {
  const p = document.createElement("p");

  p.textContent = text;
  storyEl.appendChild(p);
  p.scrollIntoView({ behavior: "smooth", block: "end" });

}

function unlockAchievement(id) {
  if (!ACHIEVEMENTS[id]) return;
  const data = loadAchievements();
  if (data.unlocked[id]) return;
  data.unlocked[id] = {
    date: new Date().toISOString(),
    seed: story ? story.variablesState["seed"] : null,
  };
  saveAchievements(data);
  showAchievementToast(id);
}

function showAchievementToast(id) {
  const a = ACHIEVEMENTS[id];
  if (!a) return;
  const t = document.createElement("div");
  t.className = "ach-toast";
  t.innerHTML =
    '<span class="icon">' + a.icon + '</span>' +
    '<div class="body"><div class="name">成就解锁：' + escapeHTML(a.name) + '</div>' +
    '<div class="desc">' + escapeHTML(a.desc) + '</div></div>';
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2600);
}

// 自动从游戏状态检测成就解锁
function detectAchievements() {
  if (!story) return;
  const v = story.variablesState;
  if (v["已进过泡面"]) unlockAchievement("noodle_contest");
  if (v["主厨刀_unlocked"]) unlockAchievement("knife_unlocked");
  if (v["当前伏笔"] && String(v["当前伏笔"]).includes("三档"))
    unlockAchievement("all_foreshadow");
  switch (v["战斗结局"]) {
    case 1: unlockAchievement("ending_victory"); break;
    case 2: unlockAchievement("ending_timeout"); break;
    case 3: unlockAchievement("ending_knockdown"); break;
    case 4: unlockAchievement("ending_escape"); break;
  }
  // Act 1
  if (v["锚点A_遭遇"]) {
    if (v["锚点A_id"] === "npc_lujianqiao") unlockAchievement("anchor_a_lu");
    if (v["锚点A_id"] === "npc_yaojunjie") unlockAchievement("anchor_a_yao");
  }
  if (v["生态置信度"] >= 5) unlockAchievement("ecology_local_b");
  if (v["Act1结束"]) {
    unlockAchievement("act1_complete");
    if (v["Act1出口路径"] === 2) unlockAchievement("climb_master");
  }
}

// ============================================================
// Tag handlers
// ============================================================
function handleStateTag(t) {
  const m = t.substring(6).match(/^([a-z_]+)([+-])(\d+)$/);
  if (!m) return;
  const [, varName, sign, num] = m;
  const delta = (sign === "+" ? 1 : -1) * parseInt(num, 10);
  const target = STATE_TARGETS[varName];
  if (!target) return;
  showFloatingDelta(target.id, delta);
  if (target.san) {
    flashSanVignette();
    if (delta <= -3) unlockAchievement("witness");
  }
}

function handleRollTag(t) {
  const parts = t.substring(5).split(",");
  if (parts.length < 4) return;
  pendingRoll = {
    round: story.variablesState["回合数"] || 0,
    skill: parts[0].trim(),
    value: parseInt(parts[1], 10),
    roll: parseInt(parts[2], 10),
    level: parseInt(parts[3], 10),
    outcome: ""
  };
  if (pendingRoll.level === 0) unlockAchievement("first_fumble");
  if (pendingRoll.level === 5) unlockAchievement("first_crit");
}

function commitPendingRoll(outcome) {
  if (!pendingRoll) return;
  pendingRoll.outcome = outcome || "";
  rollLog.unshift(pendingRoll);
  pendingRoll = null;
  renderLog();
}

function handleEcologyTag(t) {
  const n = parseInt(t.substring(8), 10);
  if (isNaN(n)) return;
  if (n > lastEcology) {
    lastEcology = n;
    renderEcology(n);
  }
}

function handleLocationTag(t) {
  const loc = t.substring(9).trim();
  if (loc !== lastLocation) {
    lastLocation = loc;
    setLocation(loc);
  }
}

function handleAchievementTag(t) {
  const id = t.substring(12).trim();
  unlockAchievement(id);
}

// ============================================================
// Story driver
// ============================================================
function continueStory() {
  while (story.canContinue) {
    const text = story.Continue().trim();
    const tags = story.currentTags || [];

    let speaker = null, scene = null, act = null;
    for (const t of tags) {
      if (t.startsWith("speaker:")) speaker = t.substring(8).trim();
      else if (t.startsWith("scene:")) scene = t.substring(6).trim();
      else if (t.startsWith("act:")) act = t.substring(4).trim();
      else if (t.startsWith("state:")) handleStateTag(t);
      else if (t.startsWith("roll:")) handleRollTag(t);
      else if (t.startsWith("ecology:")) handleEcologyTag(t);
      else if (t.startsWith("location:")) handleLocationTag(t);
      else if (t.startsWith("achievement:")) handleAchievementTag(t);
    }

    if (act && act !== lastAct) {
      appendParagraph(ACT_LABELS[act] || ("Act " + act), "act");
      lastAct = act;
    }
    if (scene && scene !== lastScene) {
      appendParagraph("〔" + (SCENE_LABELS[scene] || scene) + "〕", "scene");
      lastScene = scene;
      // Track current scene label so the choice-time checkpoint can use it
      if (scene !== lastSavedScene) lastSavedScene = scene;
    }
    if (speaker && speaker !== lastSpeaker) {
      appendParagraph(SPEAKER_LABELS[speaker] || speaker, "speaker");
      lastSpeaker = speaker;
    }
    if (text) {
      const isDice = /^〔.+〕$/.test(text);
      const isEnd = tags.some(t => t.startsWith("CLASS:end") || t.startsWith("CLASS: end"));
      let cls = null;
      if (isEnd) cls = "end";
      else if (isDice) {
        cls = "dice";
        if (pendingRoll) {
          if (pendingRoll.level === 0) cls += " fumble";
          else if (pendingRoll.level === 5) cls += " crit";
          else if (pendingRoll.level === 1) cls += " fail";
        }
      }
      appendParagraph(text, cls);
      if (pendingRoll && !isDice) commitPendingRoll(text);
    }
    if (!speaker) lastSpeaker = null;
  }
  if (pendingRoll && pendingRoll.outcome === "") commitPendingRoll("");
  renderHUD();
  renderChoices();
}

function renderChoices() {
  choicesEl.innerHTML = "";
  if (story.currentChoices.length === 0) {
    // Story ended
    onStoryEnd();
    return;
  }
  story.currentChoices.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.textContent = choice.text;
    if (choice.text === "→") btn.classList.add("continue");
    btn.onclick = () => {
      story.ChooseChoiceIndex(i);
      lastSpeaker = null;
      continueStory();
    };
    choicesEl.appendChild(btn);
  });
  // Checkpoint at every stable choice point (state ready to be picked)
  saveCheckpoint(SCENE_LABELS[lastSavedScene] || lastSavedScene || "");
}

function onStoryEnd() {
  const v = story.variablesState;
  // Mark current act as done (HUD detector also catches this, but ensure)
  if (currentAct === 0 && v["战斗结局"]) markChapterDone(0);
  if (currentAct === 1 && v["Act1结束"]) markChapterDone(1);
  if (currentAct === 2 && v["Act2结束"]) markChapterDone(2);
  if (currentAct === 3 && (v["Act3结束"] || v["最终结局"])) markChapterDone(3);

  // Snapshot transfer vars + state to seed the next act's run
  // (Cross-act resume uses a separate save under the next act)
  const vars = {};
  TRANSFER_VARS.forEach(k => { try { vars[k] = v[k]; } catch {} });

  if (currentAct < 3) {
    const nextAct = currentAct + 1;
    // Write a "ready to start next act" save: when player picks Continue,
    // we'll load act{N+1}.json and inject these vars.
    setSave({
      v: 1,            // legacy-style cross-act transfer; act{N+1} starts from top
      act: nextAct,
      fromAct: currentAct,
      vars,
      ts: Date.now(),
      scene_label: `Act ${nextAct} 起点`,
    });
    const btn = document.createElement("button");
    btn.className = "next-act";
    const titles = ["序章", "Act 1「困笼」", "Act 2「探窟」", "Act 3「破局」"];
    btn.textContent = "进入 " + titles[nextAct];
    const params = new URLSearchParams();
    params.set("act", String(nextAct));
    params.set("continue", "1");
    if (isDevMode()) params.set("dev", "1");
    btn.onclick = () => location.href = "?" + params.toString();
    choicesEl.appendChild(btn);
  }

  const restart = document.createElement("button");
  restart.className = "restart";
  restart.textContent = "返回主菜单";
  restart.onclick = () => { location.href = "."; };
  choicesEl.appendChild(restart);
}

  PC_DATA.skills.forEach(([n, s]) => {
    skEl.insertAdjacentHTML("beforeend",
      '<div class="row"><span>' + n + '</span><span>' + s + '</span></div>');
  });
  document.getElementById("pc-notes").textContent = PC_DATA.notes;
  renderCompanions();
}

function renderInventory() {
  const el = document.getElementById("pc-inventory");
  el.innerHTML = "";
  if (!story) {
    el.innerHTML = '<div class="empty">游戏未开始</div>';
    return;
  }
  const v = story.variablesState;
  const items = [];
  // 序章物品 (boolean unlocked)
  if (v["主厨刀_unlocked"]) items.push("主厨刀");
  if (v["主厨刀_unlocked"] && !v["辣椒面_used"]) items.push("辣椒面");
  // Act 1 背包 (LIST)
  try {
    const bagStr = String(v["背包"] || "");
    if (bagStr.includes("急救包")) items.push("急救包");
    if (bagStr.includes("绷带")) items.push("绷带");
    if (bagStr.includes("宿管钥匙")) items.push("宿管钥匙");
    if (bagStr.includes("数学草稿本")) items.push("数学草稿本");
    if (bagStr.includes("防疫手册")) items.push("防疫手册");
  } catch {}

  if (items.length === 0) {
    el.innerHTML = '<div class="empty">— 空 —</div>';
    return;
  }
  items.forEach(it => {
    const meta = ITEM_LABELS[it] || { icon: "📦", desc: "" };
    el.insertAdjacentHTML("beforeend",
      '<div class="item"><span class="icon">' + meta.icon + '</span>' +
      '<div><div style="font-weight:600">' + escapeHTML(it) + '</div>' +
      '<div style="color:var(--dim);font-size:12px">' + escapeHTML(meta.desc) + '</div></div></div>');
  });
}

function renderCompanions() {
  const el = document.getElementById("comp-list");
  el.innerHTML = "";
  const v = story ? story.variablesState : {};
  COMPANIONS.forEach((c) => {
    const fearVal = c.fearVar ? v[c.fearVar] : null;
    const trustVal = c.trustVar ? v[c.trustVar] : null;
    const meta = (fearVal !== null && fearVal !== undefined)
      ? "恐惧 " + fearVal + " · 信任 " + trustVal
      : "—";
    const skillsHtml = c.skills.map(([n, s]) =>
      '<div class="row"><span>' + n + '</span><span>' + s + '</span></div>').join("");
    const statsHtml = Object.entries(c.stats).map(([k, val]) =>
      '<div class="pair"><span>' + k + '</span><span>' + val + '</span></div>').join("");
    const derivedHtml = Object.entries(c.derived).map(([k, val]) =>
      '<div class="pair"><span>' + k + '</span><span>' + val + '</span></div>').join("");
    el.insertAdjacentHTML("beforeend",
      '<details class="comp-card">' +
      '<summary><span class="name">' + c.name + ' · ' + c.role + '</span><span class="meta">' + meta + '</span></summary>' +
      '<div class="body">' +
      '<p style="color:var(--dim);font-size:12px;margin:0 0 8px">' + c.occupation + ' · ' + c.age + ' 岁</p>' +
      '<h3 style="margin-top:4px">属性</h3><div class="stats-grid">' + statsHtml + '</div>' +
      '<h3>状态</h3><div class="derived-grid">' + derivedHtml + '</div>' +
      '<h3>技能</h3><div class="skills-list">' + skillsHtml + '</div>' +
      '<h3>简介</h3><p style="font-size:13px;line-height:1.6">' + c.notes + '</p>' +
      '</div></details>');
  });
}

function renderLog() {
  if (rollLog.length === 0) {
    logListEl.innerHTML = '<div class="log-empty">暂无检定记录</div>';
    return;
  }
  logListEl.innerHTML = "";
  rollLog.forEach(e => {
    const cls = LEVEL_CLASS[e.level] || "";
    const div = document.createElement("div");
    div.className = "log-entry " + (cls === "fumble" || cls === "crit" ? cls : "");
    const symbol = e.level === 0 ? "✗✗" : e.level === 1 ? "✗" : e.level === 5 ? "✓✓" : "✓";
    div.innerHTML =
      '<div class="head"><span>[回合 ' + e.round + ']</span>' +
      '<span class="res ' + cls + '">' + symbol + ' ' + LEVEL_NAMES[e.level] + '</span></div>' +
      '<div class="skill">' + escapeHTML(e.skill) + ' ' + e.value + ' · 骰 ' + e.roll + '</div>' +
      (e.outcome ? '<div class="outcome">' + escapeHTML(e.outcome) + '</div>' : '');
    logListEl.appendChild(div);
  });
}

function renderCluesTab() {
  if (!story) return;
  const v = story.variablesState;

  // 觉知链
  const aw = document.getElementById("clues-awareness");
  aw.innerHTML = "";
  const awSet = String(v["觉知"] || "");
  AWARENESS_CHAIN.forEach(node => {
    const got = awSet.includes(node.key);
    const div = document.createElement("div");
    div.className = "awareness-item " + (got ? "unlocked" : "locked");
    div.innerHTML =
      '<span class="dot"></span>' +
      '<span class="label">' + escapeHTML(node.label) + '</span>' +
      '<span class="desc">' + (got ? escapeHTML(node.desc) : "——") + '</span>';
    aw.appendChild(div);
  });

  // 生态置信度
  const eco = document.getElementById("clues-ecology");
  const cur = parseInt(v["生态置信度"] || 0, 10);
  let bars = '<div class="ecology-bar-detail">';
  for (let i = 1; i <= 7; i++) {
    bars += '<div class="ecology-tick' + (i <= cur ? ' filled' : '') + '"></div>';
  }
  bars += '</div>';
  const desc = ECOLOGY_LEVELS[cur] || "尚未察觉异常。";
  const lockedHint = cur < 7
    ? '<div style="font-size:11px;color:var(--dim2);margin-top:6px;">下一档：???</div>'
    : '';
  eco.innerHTML = bars +
    '<div class="ecology-current"><span class="level-label">当前 ' + cur + '/7</span> · ' + escapeHTML(desc) + '</div>' +
    lockedHint;

  // NPC 卡
  const npcEl = document.getElementById("clues-npcs");
  npcEl.innerHTML = "";
  const seenSet = String(v["已遇NPC"] || "");
  // 根据已遇 NPC list + 特殊感染目击 flag 来判定
  const seen = [];
  if (seenSet.includes("enc_lujianqiao") || v["锚点A_id"] === "npc_lujianqiao" && v["锚点A_遭遇"]) seen.push("npc_lujianqiao");
  if (seenSet.includes("enc_yaojunjie")  || v["锚点A_id"] === "npc_yaojunjie"  && v["锚点A_遭遇"]) seen.push("npc_yaojunjie");
  if (seenSet.includes("enc_huangxingshu") || v["锚点B_id"] === "npc_huangxingshu" && v["锚点B_遭遇"]) seen.push("npc_huangxingshu");
  if (seenSet.includes("enc_zhangbaoxing") || v["锚点B_id"] === "npc_zhangbaoxing" && v["锚点B_遭遇"]) seen.push("npc_zhangbaoxing");
  if (v["感染NPC_目击"]) seen.push("npc_huyijia");
  if (v["Act3路径"] === 2 && v["天台_已访"]) seen.push("npc_gucong");

  const unique = [...new Set(seen)];
  if (unique.length === 0) {
    npcEl.innerHTML = '<div class="npc-empty">还未遇见可调查的 NPC。</div>';
    return;
  }
  unique.forEach(id => {
    const card = NPC_CARDS[id];
    if (!card) return;
    const div = document.createElement("div");
    div.className = "npc-card" + (card.isInfected ? " infected" : "");
    let trustLine = "";
    if (card.trustVar) {
      const t = parseInt(v[card.trustVar] || 0, 10);
      trustLine = `<div class="status">信任 ${t}/100</div>`;
    }
    div.innerHTML =
      '<span class="icon">' + card.icon + '</span>' +
      '<div class="body">' +
      '<div class="name">' + escapeHTML(card.name) + '</div>' +
      '<div class="role">' + escapeHTML(card.role) + '</div>' +
      '<div class="status">' + escapeHTML(card.note) + '</div>' +
      trustLine +
      '</div>';
    npcEl.appendChild(div);
  });
}

function renderMapTab() {
  if (!story) return;
  const v = story.variablesState;
  const cur = String(v["当前地点"] || "loc_dorm_302");
  document.getElementById("map-current").textContent = LOCATION_NAMES[cur] || cur;
  const floorsEl = document.getElementById("map-floors");
  floorsEl.innerHTML = "";
  FLOORS.forEach(floor => {
    const row = document.createElement("div");
    row.className = "map-floor";
    let html = '<div class="floor-label">' + floor.label + '</div><div class="rooms">';
    floor.rooms.forEach(room => {
      const aliases = room.aliases || [];
      const isCur = room.id === cur || aliases.includes(cur);
      const visited = isCur || (room.visitedVar ? !!v[room.visitedVar] : false)
        || room.id === "loc_dorm_302"; // 起点永远已访
      let cls = "map-room";
      if (isCur) cls += " current";
      else if (visited) cls += " visited";
      html += '<span class="' + cls + '">' + escapeHTML(room.label) + '</span>';
    });
    html += '</div>';
    row.innerHTML = html;
    floorsEl.appendChild(row);
  });
}

function renderAchievementsTab() {
  const data = loadAchievements();
  const ids = Object.keys(ACHIEVEMENTS);
  const unlocked = ids.filter(id => data.unlocked[id]);
  document.getElementById("ach-unlocked-num").textContent = unlocked.length;
  document.getElementById("ach-total-num").textContent = ids.length;

  const list = document.getElementById("ach-list");
  list.innerHTML = "";
  ids.forEach(id => {
    const a = ACHIEVEMENTS[id];
    const got = data.unlocked[id];
    const div = document.createElement("div");
    div.className = "ach-item " + (got ? "unlocked" : "locked");
    let metaLine = "";
    if (got) {
      const date = new Date(got.date).toLocaleDateString("zh-CN");
      metaLine = "<div class='meta'>" + date + (got.seed ? " · seed " + got.seed : "") + "</div>";
    }
    div.innerHTML =
      '<span class="icon">' + (got ? a.icon : "🔒") + '</span>' +
      '<div class="body">' +
      '<div class="name">' + escapeHTML(a.name) + '</div>' +
      '<div class="desc">' + escapeHTML(a.desc) + '</div>' +
      metaLine +
      '</div>';
    list.appendChild(div);
  });
}

// ============================================================
// Panel control
// ============================================================
function openPanel() {
  renderPanel();
  renderLog();
  renderCluesTab();
  renderMapTab();
  renderAchievementsTab();
  sheet.classList.add("open");
  scrim.classList.add("open");
}
function closePanel() {
  sheet.classList.remove("open");
  scrim.classList.remove("open");
}
document.getElementById("open-panel").onclick = openPanel;
scrim.onclick = closePanel;

const ALL_TABS = ["stats", "log", "comp", "ach", "clues", "map"];
document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    const target = btn.dataset.tab;
    ALL_TABS.forEach(t => {
      document.getElementById("tab-" + t).classList.toggle("hidden", target !== t);
    });
    if (target === "ach") renderAchievementsTab();
    if (target === "clues") renderCluesTab();
    if (target === "map") renderMapTab();
  };
});
document.addEventListener("keydown", e => {
  if (e.key === "Escape" && sheet.classList.contains("open")) closePanel();
});

// ============================================================
// Title screen logic
// ============================================================
function refreshTitleScreen() {
  // Achievement count
  const data = loadAchievements();
  const total = Object.keys(ACHIEVEMENTS).length;
  const unlocked = Object.keys(data.unlocked || {}).length;
  document.getElementById("ach-count").textContent = unlocked;
  document.getElementById("ach-total").textContent = total;

  // Continue button state
  const save = loadSave();
  const contBtn = document.getElementById("btn-continue");
  const contMeta = document.getElementById("continue-meta");
  if (save && save.v === SAVE_SCHEMA_VERSION) {
    contBtn.disabled = false;
    const date = new Date(save.ts).toLocaleString("zh-CN", { month: "numeric", day: "numeric", hour: "2-digit", minute: "2-digit" });
    contMeta.textContent = `Act ${save.act}${save.scene_label ? " · " + save.scene_label : ""} · ${date}`;
  } else if (save && save.act === 1 && save.fromAct === 0) {
    // Legacy v1 save: from Act 0 → Act 1 transition only
    contBtn.disabled = false;
    contMeta.textContent = `Act 1 (旧版存档)`;
  } else {
    contBtn.disabled = true;
    contMeta.textContent = "无存档";
  }

  // Chapter completion count
  const cp = loadChapterProgress();
  const done = ACTS_META.filter(a => cp[a.id] === "done").length;
  const chapterMeta = document.getElementById("chapter-meta");
  if (isDevMode()) chapterMeta.textContent = `已通关 ${done} / 4 幕  ·  DEV MODE`;
  else chapterMeta.textContent = `已通关 ${done} / 4 幕`;
}

function startNewGame() {
  if (loadSave()) {
    if (!confirm("发现已有存档。开始新游戏会清空当前进度，确定继续？")) return;
  }
  clearSave();
  // 多 PC 路线: 显示 PC 选择屏 (不直接进游戏)
  showPCSelect();
}

function showPCSelect() {
  document.getElementById("title-screen").hidden = true;
  document.getElementById("pc-select-screen").hidden = false;
}

function hidePCSelect() {
  document.getElementById("pc-select-screen").hidden = true;
  document.getElementById("title-screen").hidden = false;
}

// PC 卡片点击: redirect 到 ?act=0&pc=X，由 bootstrap 注入 当前PC LIST var
document.querySelectorAll(".pc-select-card").forEach(card => {
  card.onclick = () => {
    const pc = card.dataset.pc;
    const seedInput = document.getElementById("seed-input").value;
    const params = new URLSearchParams();
    params.set("act", "0");
    params.set("pc", pc);
    if (seedInput) params.set("seed", seedInput);
    if (isDevMode()) params.set("dev", "1");
    location.href = "?" + params.toString();
  };
});
document.getElementById("pc-select-back").onclick = hidePCSelect;

function continueGame() {
  const save = loadSave();
  if (!save) return;
  // Legacy v1 save: jump to act + inject vars (best effort)
  // v2 save: jump to act with continue=1, startGame will LoadJson the state
  const params = new URLSearchParams();
  params.set("act", save.act);
  params.set("continue", "1");
  if (isDevMode()) params.set("dev", "1");
  location.href = "?" + params.toString();
}

function openChapterSelect() {
  const modal = document.getElementById("chapter-modal");
  const list = document.getElementById("chapter-list");
  const footer = document.getElementById("chapter-footer");
  list.innerHTML = "";
  const cp = loadChapterProgress();
  ACTS_META.forEach(a => {
    const unlocked = isChapterUnlocked(a.id);
    const done = cp[a.id] === "done";
    const btn = document.createElement("button");
    btn.className = "chapter-item" + (done ? " done" : "") + (!unlocked ? " locked" : "");
    btn.disabled = !unlocked;
    let metaText = a.meta;
    if (!unlocked) metaText = `🔒 通关 Act ${a.id - 1} 后解锁`;
    else if (done) metaText = a.meta + "  ·  ✓ 已通关";
    btn.innerHTML =
      '<span>' + escapeHTML(a.title) + '</span>' +
      '<span class="meta">' + escapeHTML(metaText) + '</span>';
    btn.onclick = () => {
      if (loadSave() && !confirm(`从 ${a.title} 重新开始会清空当前存档，确定？`)) return;
      clearSave();
      const seedInput = document.getElementById("seed-input").value;
      const params = new URLSearchParams();
      params.set("act", String(a.id));
      if (seedInput) params.set("seed", seedInput);
      if (isDevMode()) params.set("dev", "1");
      location.href = "?" + params.toString();
    };
    list.appendChild(btn);
  });
  footer.textContent = isDevMode() ? "DEV MODE · 全部章节解锁" : "通关一幕解锁下一幕";
  modal.hidden = false;
}
function closeChapterSelect() {
  document.getElementById("chapter-modal").hidden = true;
}

document.getElementById("btn-new-game").onclick = startNewGame;
document.getElementById("btn-continue").onclick = continueGame;
document.getElementById("btn-chapter-select").onclick = openChapterSelect;
document.getElementById("chapter-close").onclick = closeChapterSelect;
document.getElementById("chapter-modal").addEventListener("click", e => {
  if (e.target.id === "chapter-modal") closeChapterSelect();
});

refreshTitleScreen();

document.getElementById("show-achievements").onclick = () => {
  // Open game shell view briefly to show achievements panel
  // Simpler: just open the panel inline using a faux story-less mode
  renderAchievementsTab();
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.querySelector('.tab-btn[data-tab="ach"]').classList.add("active");
  ["stats", "log", "comp", "ach"].forEach(t => {
    document.getElementById("tab-" + t).classList.toggle("hidden", t !== "ach");
  });
  sheet.classList.add("open");
  scrim.classList.add("open");
};

// ============================================================
// Game start (URL ?act=N)
// ============================================================
async function startGame(act, seedOverride, continueFromSave, selectedPC) {
  currentAct = act;
  const url = `kongjiang_act${act}.json`;
  try {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error("Failed to load " + url + ": " + resp.status);
    storyJson = await resp.text();
    story = new inkjs.Story(storyJson);

    // Seed injection (Act 1 supports it natively; Act 0 has hardcoded seed but can override)
    if (seedOverride) {
      try { story.variablesState["seed"] = parseInt(seedOverride, 10); } catch {}
    }

    // 多 PC: 注入 当前PC LIST var (act0 入口的 ~ 初始化PC(当前PC) 会读到)
    if (selectedPC) {
      try {
        story.variablesState["当前PC"] = inkjs.InkList.FromString(selectedPC, story);
      } catch (e) {
        console.warn("当前PC LIST 注入失败:", e);
      }
    }

    titleScreen.classList.add("hidden");
    gameEl.classList.remove("hidden");

    // Continue from saved state
    let resumedFromCheckpoint = false;
    if (continueFromSave) {
      const save = loadSave();
      if (save && save.v === SAVE_SCHEMA_VERSION && save.act === act && save.state_json) {
        // v2: full state restore — story is now waiting at choices, no Continue() needed
        try {
          story.state.LoadJson(save.state_json);
          resumedFromCheckpoint = true;
          lastSavedScene = null; // force re-checkpoint on next scene change
        } catch (e) {
          console.warn("LoadJson failed, falling back to legacy:", e);
        }
      } else if (save && save.vars) {
        // v1 legacy: inject loose vars only
        for (const [k, val] of Object.entries(save.vars)) {
          try { story.variablesState[k] = val; } catch {}
        }
      }
    }

    if (resumedFromCheckpoint) {
      // State already at choice point. Skip Continue, render immediately.
      renderHUD();
      renderChoices();
    } else {
      continueStory();
    }
  } catch (e) {
    titleScreen.classList.remove("hidden");
    showError("加载失败：" + e.message);
    console.error(e);
  }
}

// Bootstrap from URL
const urlParams = new URLSearchParams(location.search);
const requestedAct = urlParams.get("act");
const requestedSeed = urlParams.get("seed");
const isContinue = urlParams.get("continue") === "1";
const requestedPC = urlParams.get("pc");

if (requestedAct !== null) {
  startGame(parseInt(requestedAct, 10) || 0, requestedSeed, isContinue, requestedPC);
}
// Otherwise stay on title screen
</script>
