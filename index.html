<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0B0B0E">
<title>控江隔离 · 序章</title>
<style>
:root {
  --bg: #0B0B0E;
  --fg: #E8E0CC;
  --dim: #8A8478;
  --dim2: #5A554C;
  --accent: #B83A3A;
  --gold: #C9A33A;
  --panel: #16161B;
  --panel-hover: #22222A;
  --panel-2: #1F1F26;
  --border: #2A2A33;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: var(--bg);
  color: var(--fg);
  font-family: "Noto Serif SC", "Source Han Serif SC", "Songti SC", "STSong", "SimSun", serif;
  font-size: 17px;
  line-height: 1.85;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
}
body {
  min-height: 100vh; min-height: 100dvh;
  display: flex; flex-direction: column;
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}

/* ============ HUD ============ */
header.hud {
  flex: 0 0 auto;
  padding: 8px 14px;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  color: var(--dim);
  display: flex;
  flex-wrap: wrap;
  gap: 4px 10px;
  align-items: center;
  background: rgba(11, 11, 14, 0.95);
  backdrop-filter: blur(8px);
  position: sticky; top: 0; z-index: 10;
}
.stat { white-space: nowrap; position: relative; }
.stat b { color: var(--fg); font-weight: 500; }
.stat.warn b { color: var(--accent); }
.pc-chip {
  appearance: none;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--fg);
  border-radius: 6px;
  padding: 4px 9px 4px 7px;
  font-family: inherit;
  font-size: 12px;
  cursor: pointer;
  display: inline-flex; align-items: center; gap: 4px;
  -webkit-tap-highlight-color: transparent;
  transition: border-color 0.15s, background 0.15s;
}
.pc-chip:hover, .pc-chip:active { border-color: var(--accent); background: var(--panel); }
.pc-chip .icon { font-size: 11px; opacity: 0.7; }
.pc-chip b { color: var(--fg); font-weight: 500; }
.lang {
  margin-left: auto;
  color: var(--dim);
  text-decoration: none;
  border: 1px solid var(--border);
  padding: 2px 8px;
  border-radius: 6px;
  font-size: 12px;
}
.lang:hover { color: var(--fg); border-color: var(--accent); }

/* Floating delta */
.delta-pop {
  position: absolute;
  bottom: 100%; left: 50%;
  transform: translateX(-50%);
  font-size: 13px;
  font-weight: 600;
  pointer-events: none;
  animation: deltaFly 800ms ease-out forwards;
  z-index: 20;
}
.delta-pop.up { color: var(--accent); }
.delta-pop.down { color: #6BAA5C; }
@keyframes deltaFly {
  0%   { opacity: 0; transform: translate(-50%, 0); }
  20%  { opacity: 1; }
  100% { opacity: 0; transform: translate(-50%, -28px); }
}

/* SAN vignette */
.vignette {
  position: fixed; inset: 0;
  pointer-events: none;
  background: radial-gradient(ellipse at center, transparent 30%, rgba(184, 58, 58, 0.55) 100%);
  opacity: 0;
  z-index: 5;
}
.vignette.flash { animation: sanFlash 800ms ease-out; }
@keyframes sanFlash {
  0%   { opacity: 0; }
  20%  { opacity: 1; }
  100% { opacity: 0; }
}

/* ============ Story ============ */
main {
  flex: 1 1 auto;
  padding: 18px 18px 8px;
  max-width: 720px; width: 100%;
  margin: 0 auto;
}
#story p {
  margin: 0 0 1em 0;
  animation: fadeIn 0.6s ease-out;
}
#story p.speaker {
  color: var(--dim);
  font-size: 13px;
  margin-bottom: 0.2em;
  letter-spacing: 0.05em;
}
#story p.scene {
  color: var(--dim);
  font-size: 12px;
  font-style: italic;
  border-left: 2px solid var(--border);
  padding-left: 10px;
  margin: 1.4em 0 0.8em 0;
}
#story p.act {
  color: var(--accent);
  font-size: 13px;
  text-align: center;
  letter-spacing: 0.3em;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  padding: 0.6em 0;
  margin: 1.6em 0;
}
#story p.dice {
  font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  color: var(--dim);
  font-size: 13px;
  margin: 0.4em 0;
  letter-spacing: 0.02em;
}
#story p.dice.fail { color: #B07070; }
#story p.dice.fumble { color: var(--accent); font-weight: 600; }
#story p.dice.crit { color: var(--gold); font-weight: 600; }
#story p.end {
  text-align: center;
  font-weight: 600;
  font-size: 19px;
  margin: 2em 0 0.4em;
  letter-spacing: 0.2em;
  color: var(--accent);
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: none; }
}

/* ============ Choices ============ */
nav#choices {
  flex: 0 0 auto;
  padding: 12px 18px calc(env(safe-area-inset-bottom) + 16px);
  max-width: 720px; width: 100%;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
  border-top: 1px solid var(--border);
  background: var(--bg);
}
nav#choices button {
  appearance: none;
  background: var(--panel);
  color: var(--fg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  font-family: inherit;
  font-size: 16px;
  line-height: 1.5;
  text-align: left;
  min-height: 48px;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
  -webkit-tap-highlight-color: transparent;
}
nav#choices button:active,
nav#choices button:hover {
  background: var(--panel-hover);
  border-color: var(--accent);
}
nav#choices button.continue {
  text-align: center;
  font-size: 22px;
  letter-spacing: 0.4em;
  padding: 12px;
  color: var(--accent);
}
nav#choices button.skill-check {
  /* Highlight skill choices subtly */
}
nav#choices button.skill-check::first-letter {
  /* placeholder */
}
nav#choices .restart {
  background: transparent;
  border-color: var(--accent);
  color: var(--accent);
  text-align: center;
}

/* ============ Bottom Sheet Panel ============ */
.scrim {
  position: fixed; inset: 0;
  background: rgba(0, 0, 0, 0.55);
  backdrop-filter: blur(2px);
  z-index: 50;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
}
.sheet {
  position: fixed;
  left: 0; right: 0; bottom: 0;
  max-width: 720px;
  margin: 0 auto;
  background: var(--panel-2);
  border-radius: 18px 18px 0 0;
  border-top: 1px solid var(--border);
  z-index: 51;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(.2,.7,.2,1);
  max-height: 85vh; max-height: 85dvh;
  display: flex;
  flex-direction: column;
  padding-bottom: env(safe-area-inset-bottom);
}
.sheet.open { transform: none; }
.scrim.open { opacity: 1; pointer-events: auto; }
.sheet .handle {
  width: 40px; height: 4px;
  background: var(--dim2);
  border-radius: 2px;
  margin: 8px auto 4px;
  flex: 0 0 auto;
}
.sheet .tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--border);
  flex: 0 0 auto;
}
.sheet .tabs button {
  appearance: none;
  background: transparent;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--dim);
  font-family: inherit;
  font-size: 14px;
  padding: 12px 16px;
  flex: 1;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.sheet .tabs button.active {
  color: var(--fg);
  border-bottom-color: var(--accent);
}
.sheet .tab-content {
  overflow-y: auto;
  padding: 14px 18px 24px;
  -webkit-overflow-scrolling: touch;
  flex: 1 1 auto;
}
.sheet .tab-content.hidden { display: none; }
.sheet h2 { font-size: 18px; font-weight: 600; margin: 4px 0 2px; }
.sheet h3 {
  font-size: 12px;
  color: var(--dim);
  font-weight: 500;
  letter-spacing: 0.15em;
  margin: 16px 0 6px;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--border);
}
.sheet .char-meta { font-size: 13px; color: var(--dim); margin: 0 0 6px; }
.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px 12px;
  font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  font-size: 14px;
}
.stats-grid .pair { display: flex; justify-content: space-between; padding: 4px 8px; background: var(--panel); border-radius: 6px; }
.stats-grid .pair span:first-child { color: var(--dim); }
.stats-grid .pair span:last-child { color: var(--fg); font-weight: 600; }
.derived-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 6px 12px;
  font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  font-size: 14px;
}
.derived-grid .pair { display: flex; justify-content: space-between; padding: 6px 10px; background: var(--panel); border-radius: 6px; }
.derived-grid .pair.live { border-left: 2px solid var(--accent); }
.derived-grid .pair span:first-child { color: var(--dim); }
.skills-list { display: flex; flex-direction: column; gap: 4px; font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; font-size: 14px; }
.skills-list .row { display: flex; justify-content: space-between; padding: 5px 10px; background: var(--panel); border-radius: 6px; }
.skills-list .row span:last-child { color: var(--fg); font-weight: 600; }
.notes { font-size: 14px; line-height: 1.7; color: var(--fg); }

/* Log */
.log-entry {
  background: var(--panel);
  border-radius: 8px;
  padding: 10px 12px;
  margin-bottom: 8px;
  font-size: 14px;
  border-left: 2px solid var(--border);
}
.log-entry .head {
  display: flex; justify-content: space-between; align-items: center;
  font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  font-size: 12px;
  color: var(--dim);
  margin-bottom: 3px;
}
.log-entry .skill {
  font-weight: 600;
  color: var(--fg);
  font-size: 14px;
}
.log-entry .res { font-size: 12px; }
.log-entry .res.success { color: #6BAA5C; }
.log-entry .res.fail { color: #B07070; }
.log-entry .res.fumble { color: var(--accent); font-weight: 600; }
.log-entry .res.crit { color: var(--gold); font-weight: 600; }
.log-entry .outcome { color: var(--fg); margin-top: 4px; line-height: 1.6; }
.log-entry.fumble { background: rgba(184, 58, 58, 0.08); border-left-color: var(--accent); }
.log-entry.crit { background: rgba(201, 163, 58, 0.08); border-left-color: var(--gold); }
.log-empty { color: var(--dim); font-style: italic; text-align: center; padding: 30px 10px; }

/* Companion cards */
.comp-card {
  background: var(--panel);
  border-radius: 8px;
  padding: 10px 14px;
  margin-bottom: 10px;
}
.comp-card summary {
  display: flex; justify-content: space-between; align-items: center;
  cursor: pointer; list-style: none;
  padding: 4px 0;
}
.comp-card summary::-webkit-details-marker { display: none; }
.comp-card summary .name { font-weight: 600; font-size: 15px; }
.comp-card summary .meta {
  font-size: 12px; color: var(--dim);
  font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}
.comp-card[open] summary { margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.comp-card .body { font-size: 13px; line-height: 1.6; }

.error { color: var(--accent); padding: 20px; text-align: center; font-size: 14px; }
</style>
</head>
<body>

<header class="hud" id="hud">
  <button class="pc-chip" id="open-panel" aria-label="打开角色面板">
    <span class="icon">📋</span>
    <span>罗昕</span>
    <span>SAN <b id="san">—</b></span>
  </button>
  <span class="stat">你 恐惧 <b id="fear-xin">—</b></span>
  <span class="stat">志勇 <b id="fear-zy">—</b></span>
  <span class="stat">张怡 <b id="fear-zy2">—</b></span>
  <span class="stat">回合 <b id="rounds">0</b></span>
  <a class="lang" href="en/">EN</a>
</header>

<main id="story" aria-live="polite"></main>

<nav id="choices"></nav>

<div class="vignette" id="vignette"></div>
<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet" role="dialog" aria-modal="true">
  <div class="handle"></div>
  <div class="tabs">
    <button class="tab-btn active" data-tab="stats">属性</button>
    <button class="tab-btn" data-tab="log">检定记录</button>
    <button class="tab-btn" data-tab="comp">队友</button>
  </div>
  <div class="tab-content" id="tab-stats">
    <h2 id="pc-name">罗昕 · 昕</h2>
    <p class="char-meta" id="pc-meta">高三学生（吃货/社交核心） · 17 岁 · 男</p>

    <h3>属性</h3>
    <div class="stats-grid" id="pc-stats"></div>

    <h3>状态</h3>
    <div class="derived-grid" id="pc-derived"></div>

    <h3>技能</h3>
    <div class="skills-list" id="pc-skills"></div>

    <h3>简介</h3>
    <p class="notes" id="pc-notes"></p>
  </div>
  <div class="tab-content hidden" id="tab-log">
    <div id="log-list"></div>
  </div>
  <div class="tab-content hidden" id="tab-comp">
    <div id="comp-list"></div>
  </div>
</div>

<script src="https://unpkg.com/inkjs@2.3.1/dist/ink.js"></script>
<script>
// ============================================================
// 数据：角色（同步自 worlds/modules/kongjiang-isolation/characters.json）
// ============================================================
const PC_DATA = {
  fullname: "罗昕",
  name: "昕",
  occupation: "高三学生（吃货/社交核心）",
  age: 17, gender: "男",
  stats: { STR: 65, CON: 55, SIZ: 65, DEX: 70, APP: 65, INT: 65, POW: 70, EDU: 55, LUK: 75 },
  derived: { HP_max: 12, MP_max: 14, SAN_max: 99, Build: 0, DB: "0", MOV: 9 },
  skills: [
    ["侦察", 80], ["聆听", 65], ["说服", 65],
    ["格斗（斗殴）", 45], ["攀爬", 55], ["投掷", 50],
    ["潜行", 45], ["急救", 35], ["幸运", 75]
  ],
  notes: "微胖吃货，是寝室里的社交核心、话最多的人。表面随和，实际上是全 F4 跑得最快的。猎奇禁片+鲁迅双重熏陶，面对血腥场面心理抗性远超常人。深受武侠影响，极重义气，视 302 室兄弟为生死之交。梦想去法国蓝带学烹饪，神级嗅觉能瞬间辨识各种肉类。主厨刀是他秘密。"
};

const COMPANIONS = [
  {
    name: "砚波", role: "住客", age: 17, gender: "男",
    occupation: "高三学生（健身狂/邋遢大王）",
    stats: { STR: 75, CON: 50, SIZ: 70, DEX: 65, APP: 55, INT: 80, POW: 60, EDU: 55, LUK: 45 },
    derived: { HP: 12, MP: 12, SAN: 60, Build: 1, DB: "+1D4", MOV: 8 },
    skills: [["格斗（斗殴）", 65], ["投掷", 55], ["攀爬", 55], ["侦察", 65], ["聆听", 50], ["说服", 55], ["图书馆使用", 60], ["计算机使用", 35], ["急救", 25]],
    notes: "全寝室最能打的人，靠哑铃和爆发力称霸。脑子反应快，语文极好，危机时最先说清楚问题是什么。",
    fearVar: null
  },
  {
    name: "志勇", role: "访客", age: 18, gender: "男",
    occupation: "高三学生（隐藏宅男/警察世家）",
    stats: { STR: 85, CON: 70, SIZ: 90, DEX: 60, APP: 50, INT: 55, POW: 60, EDU: 50, LUK: 50 },
    derived: { HP: 16, MP: 12, SAN: 60, Build: 2, DB: "+1D6", MOV: 9 },
    skills: [["格斗（斗殴）", 55], ["攀爬", 65], ["跳跃", 60], ["投掷", 50], ["侦察", 60], ["聆听", 55], ["计算机使用", 65], ["电气维修", 40]],
    notes: "1.9 米的沉默巨汉。外表最能打，内心最需要被保护——极度厌恶恐怖片，深度二次元 + 游戏宅。父亲教过警用擒拿。",
    fearVar: "恐惧_志勇", trustVar: "信任_志勇"
  },
  {
    name: "张怡", role: "访客", age: 17, gender: "男",
    occupation: "高三学生（数学天才/魔兽宅）",
    stats: { STR: 40, CON: 50, SIZ: 55, DEX: 60, APP: 65, INT: 85, POW: 70, EDU: 65, LUK: 45 },
    derived: { HP: 10, MP: 14, SAN: 70, Build: 0, DB: "0", MOV: 8 },
    skills: [["计算机使用", 70], ["图书馆使用", 60], ["侦察", 65], ["聆听", 65], ["说服", 55], ["格斗（斗殴）", 25], ["潜行", 40], ["神秘学", 35]],
    notes: "数学天才，对数字和规律有超自然的直觉。八卦天线无时不开。带着满电充电宝来串门——团队最重要的物资。",
    fearVar: "恐惧_张怡", trustVar: "信任_张怡"
  }
];

const SCENE_LABELS = { dorm_302: "302 寝室" };
const SPEAKER_LABELS = { player: "你", xin: "昕", zhiyong: "志勇", zhangyi: "张怡", yanbo: "砚波" };
const ACT_LABELS = { "0": "Act 0 · 序章", "1": "Act 1 · 困笼" };

const STATE_TARGETS = {
  san_xin:        { id: "san",       label: "理智", san: true },
  fear_xin:       { id: "fear-xin",  label: "你 恐惧" },
  fear_zhiyong:   { id: "fear-zy",   label: "志勇 恐惧" },
  fear_zhangyi:   { id: "fear-zy2",  label: "张怡 恐惧" },
};

const LEVEL_NAMES = ["大失败", "失败", "成功", "困难成功", "极难成功", "大成功"];
const LEVEL_CLASS = ["fumble", "fail", "success", "success", "success", "crit"];

// ============================================================
// State
// ============================================================
const storyEl = document.getElementById("story");
const choicesEl = document.getElementById("choices");
const sheet = document.getElementById("sheet");
const scrim = document.getElementById("scrim");
const vignetteEl = document.getElementById("vignette");
const logListEl = document.getElementById("log-list");

let storyJson = null;
let story = null;
let lastScene = null, lastSpeaker = null, lastAct = null;
let pendingRoll = null;
const rollLog = [];

// ============================================================
// Render helpers
// ============================================================
function showError(msg) { storyEl.innerHTML = '<div class="error">' + msg + '</div>'; }

function appendParagraph(text, cls) {
  const p = document.createElement("p");
  if (cls) p.className = cls;
  p.textContent = text;
  storyEl.appendChild(p);
  p.scrollIntoView({ behavior: "smooth", block: "end" });
  return p;
}

function renderHUD() {
  const v = story.variablesState;
  document.getElementById("san").textContent = v["理智_昕"];
  const setFear = (id, val) => {
    const el = document.getElementById(id);
    el.textContent = val;
    const stat = el.closest(".stat") || el.closest(".pc-chip");
    if (stat) {
      if (val >= 50) stat.classList.add("warn");
      else stat.classList.remove("warn");
    }
  };
  setFear("fear-xin", v["恐惧_昕"]);
  setFear("fear-zy", v["恐惧_志勇"]);
  setFear("fear-zy2", v["恐惧_张怡"]);
  document.getElementById("rounds").textContent = v["回合数"];
  // Refresh panel SAN if open
  if (sheet.classList.contains("open")) renderPanel();
}

function showFloatingDelta(targetId, delta) {
  const target = document.getElementById(targetId);
  if (!target) return;
  const stat = target.closest(".stat") || target.closest(".pc-chip");
  if (!stat) return;
  const pop = document.createElement("span");
  pop.className = "delta-pop " + (delta > 0 ? "up" : "down");
  pop.textContent = (delta > 0 ? "+" : "") + delta;
  stat.appendChild(pop);
  setTimeout(() => pop.remove(), 850);
}

function flashSanVignette() {
  vignetteEl.classList.remove("flash");
  void vignetteEl.offsetWidth;  // reflow
  vignetteEl.classList.add("flash");
}

// ============================================================
// Tag handlers
// ============================================================
function handleStateTag(t) {
  // state:fear_xin+5 / state:san_xin-3
  const m = t.substring(6).match(/^([a-z_]+)([+-])(\d+)$/);
  if (!m) return;
  const [, varName, sign, num] = m;
  const delta = (sign === "+" ? 1 : -1) * parseInt(num, 10);
  const target = STATE_TARGETS[varName];
  if (!target) return;
  showFloatingDelta(target.id, delta);
  if (target.san) flashSanVignette();
}

function handleRollTag(t) {
  // roll:技能,值,骰,档
  const parts = t.substring(5).split(",");
  if (parts.length < 4) return;
  const [skill, value, roll, level] = parts;
  pendingRoll = {
    round: story.variablesState["回合数"],
    skill: skill.trim(),
    value: parseInt(value, 10),
    roll: parseInt(roll, 10),
    level: parseInt(level, 10),
    outcome: ""
  };
}

function commitPendingRoll(outcome) {
  if (!pendingRoll) return;
  pendingRoll.outcome = outcome || "";
  rollLog.unshift(pendingRoll);
  pendingRoll = null;
  renderLog();
}

// ============================================================
// Story driver
// ============================================================
function continueStory() {
  while (story.canContinue) {
    const text = story.Continue().trim();
    const tags = story.currentTags || [];

    let speaker = null, scene = null, act = null;
    for (const t of tags) {
      if (t.startsWith("speaker:")) speaker = t.substring(8).trim();
      else if (t.startsWith("scene:")) scene = t.substring(6).trim();
      else if (t.startsWith("act:")) act = t.substring(4).trim();
      else if (t.startsWith("state:")) handleStateTag(t);
      else if (t.startsWith("roll:")) handleRollTag(t);
    }

    if (act && act !== lastAct) {
      appendParagraph(ACT_LABELS[act] || ("Act " + act), "act");
      lastAct = act;
    }
    if (scene && scene !== lastScene) {
      const label = SCENE_LABELS[scene] || scene;
      appendParagraph("〔" + label + "〕", "scene");
      lastScene = scene;
    }
    if (speaker && speaker !== lastSpeaker) {
      appendParagraph(SPEAKER_LABELS[speaker] || speaker, "speaker");
      lastSpeaker = speaker;
    }
    if (text) {
      const isDice = /^〔.+〕$/.test(text);
      const isEnd = tags.some(t => t.startsWith("CLASS:end") || t.startsWith("CLASS: end"));
      let cls = null;
      if (isEnd) cls = "end";
      else if (isDice) {
        cls = "dice";
        if (pendingRoll) {
          if (pendingRoll.level === 0) cls += " fumble";
          else if (pendingRoll.level === 5) cls += " crit";
          else if (pendingRoll.level === 1) cls += " fail";
        }
      }
      appendParagraph(text, cls);

      if (pendingRoll && !isDice) {
        commitPendingRoll(text);
      }
    }
    if (!speaker) lastSpeaker = null;
  }

  // Commit any orphan pending roll (dice line had no follow-up text yet)
  if (pendingRoll && pendingRoll.outcome === "") commitPendingRoll("");

  renderHUD();
  renderChoices();
}

function renderChoices() {
  choicesEl.innerHTML = "";
  if (story.currentChoices.length === 0) {
    const btn = document.createElement("button");
    btn.className = "restart";
    btn.textContent = "重新开始";
    btn.onclick = () => restart();
    choicesEl.appendChild(btn);
    return;
  }
  story.currentChoices.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.textContent = choice.text;
    if (choice.text === "→") btn.classList.add("continue");
    if (/〔.+〕/.test(choice.text)) btn.classList.add("skill-check");
    btn.onclick = () => {
      story.ChooseChoiceIndex(i);
      lastSpeaker = null;
      continueStory();
    };
    choicesEl.appendChild(btn);
  });
}

// ============================================================
// Panel rendering
// ============================================================
function renderPanel() {
  // Header
  document.getElementById("pc-name").textContent = PC_DATA.fullname + " · " + PC_DATA.name;
  document.getElementById("pc-meta").textContent =
    PC_DATA.occupation + " · " + PC_DATA.age + " 岁 · " + PC_DATA.gender;

  // Stats
  const statsEl = document.getElementById("pc-stats");
  statsEl.innerHTML = "";
  for (const [k, v] of Object.entries(PC_DATA.stats)) {
    statsEl.insertAdjacentHTML("beforeend",
      '<div class="pair"><span>' + k + '</span><span>' + v + '</span></div>');
  }

  // Derived (live SAN)
  const v = story ? story.variablesState : {};
  const liveSAN = story ? v["理智_昕"] : PC_DATA.derived.SAN_max;
  const liveHP = story ? v["HP_昕"] : PC_DATA.derived.HP_max;
  const derEl = document.getElementById("pc-derived");
  derEl.innerHTML = "";
  const rows = [
    ["HP", liveHP + " / " + PC_DATA.derived.HP_max, true],
    ["MP", PC_DATA.derived.MP_max + " / " + PC_DATA.derived.MP_max, false],
    ["SAN", liveSAN + " / " + PC_DATA.derived.SAN_max, true],
    ["Build", PC_DATA.derived.Build, false],
    ["DB", PC_DATA.derived.DB, false],
    ["MOV", PC_DATA.derived.MOV, false],
  ];
  rows.forEach(([k, val, live]) => {
    derEl.insertAdjacentHTML("beforeend",
      '<div class="pair' + (live ? ' live' : '') + '"><span>' + k + '</span><span>' + val + '</span></div>');
  });

  // Skills
  const skEl = document.getElementById("pc-skills");
  skEl.innerHTML = "";
  PC_DATA.skills.forEach(([name, val]) => {
    skEl.insertAdjacentHTML("beforeend",
      '<div class="row"><span>' + name + '</span><span>' + val + '</span></div>');
  });

  // Notes
  document.getElementById("pc-notes").textContent = PC_DATA.notes;

  renderCompanions();
}

function renderCompanions() {
  const el = document.getElementById("comp-list");
  el.innerHTML = "";
  const v = story ? story.variablesState : {};
  COMPANIONS.forEach((c, idx) => {
    const fearVal = c.fearVar ? v[c.fearVar] : null;
    const trustVal = c.trustVar ? v[c.trustVar] : null;
    const meta = (fearVal !== null && fearVal !== undefined)
      ? "恐惧 " + fearVal + " · 信任 " + trustVal
      : "—";
    const skillsHtml = c.skills.map(([n, s]) =>
      '<div class="row"><span>' + n + '</span><span>' + s + '</span></div>').join("");
    const statsHtml = Object.entries(c.stats).map(([k, val]) =>
      '<div class="pair"><span>' + k + '</span><span>' + val + '</span></div>').join("");
    const derivedHtml = Object.entries(c.derived).map(([k, val]) =>
      '<div class="pair"><span>' + k + '</span><span>' + val + '</span></div>').join("");
    el.insertAdjacentHTML("beforeend",
      '<details class="comp-card"' + (idx === 0 ? '' : '') + '>' +
      '<summary><span class="name">' + c.name + ' · ' + c.role + '</span><span class="meta">' + meta + '</span></summary>' +
      '<div class="body">' +
      '<p style="color:var(--dim);font-size:12px;margin:0 0 8px">' + c.occupation + ' · ' + c.age + ' 岁</p>' +
      '<h3 style="margin-top:4px">属性</h3><div class="stats-grid">' + statsHtml + '</div>' +
      '<h3>状态</h3><div class="derived-grid">' + derivedHtml + '</div>' +
      '<h3>技能</h3><div class="skills-list">' + skillsHtml + '</div>' +
      '<h3>简介</h3><p style="font-size:13px;line-height:1.6">' + c.notes + '</p>' +
      '</div></details>');
  });
}

function renderLog() {
  if (rollLog.length === 0) {
    logListEl.innerHTML = '<div class="log-empty">暂无检定记录</div>';
    return;
  }
  logListEl.innerHTML = "";
  rollLog.forEach(e => {
    const cls = LEVEL_CLASS[e.level] || "";
    const div = document.createElement("div");
    div.className = "log-entry " + (cls === "fumble" || cls === "crit" ? cls : "");
    const symbol = e.level === 0 ? "✗✗" :
                   e.level === 1 ? "✗" :
                   e.level === 5 ? "✓✓" : "✓";
    div.innerHTML =
      '<div class="head">' +
        '<span>[回合 ' + e.round + ']</span>' +
        '<span class="res ' + cls + '">' + symbol + ' ' + LEVEL_NAMES[e.level] + '</span>' +
      '</div>' +
      '<div class="skill">' + escapeHTML(e.skill) + ' ' + e.value + ' · 骰 ' + e.roll + '</div>' +
      (e.outcome ? '<div class="outcome">' + escapeHTML(e.outcome) + '</div>' : '');
    logListEl.appendChild(div);
  });
}

function escapeHTML(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// ============================================================
// Panel open/close + tabs
// ============================================================
function openPanel() {
  renderPanel();
  renderLog();
  sheet.classList.add("open");
  scrim.classList.add("open");
}
function closePanel() {
  sheet.classList.remove("open");
  scrim.classList.remove("open");
}
document.getElementById("open-panel").onclick = openPanel;
scrim.onclick = closePanel;

document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    const target = btn.dataset.tab;
    document.getElementById("tab-stats").classList.toggle("hidden", target !== "stats");
    document.getElementById("tab-log").classList.toggle("hidden", target !== "log");
    document.getElementById("tab-comp").classList.toggle("hidden", target !== "comp");
  };
});

// ESC to close
document.addEventListener("keydown", e => {
  if (e.key === "Escape" && sheet.classList.contains("open")) closePanel();
});

// ============================================================
// Restart
// ============================================================
function restart() {
  story = new inkjs.Story(storyJson);
  storyEl.innerHTML = "";
  rollLog.length = 0;
  pendingRoll = null;
  lastScene = null; lastSpeaker = null; lastAct = null;
  continueStory();
}

// ============================================================
// Main
// ============================================================
async function main() {
  try {
    const resp = await fetch("kongjiang_act0.json");
    if (!resp.ok) throw new Error("Failed to load story: " + resp.status);
    storyJson = await resp.text();
    story = new inkjs.Story(storyJson);
    continueStory();
  } catch (e) {
    showError("加载失败：" + e.message);
    console.error(e);
  }
}
main();
</script>
