<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0B0B0E">
<title>控江往事 · 静默深渊</title>
<style>
:root {
  --bg: #0B0B0E;
  --fg: #E8E0CC;
  --dim: #8A8478;
  --dim2: #5A554C;
  --accent: #B83A3A;
  --gold: #C9A33A;
  --green: #6BAA5C;
  --panel: #16161B;
  --panel-hover: #22222A;
  --panel-2: #1F1F26;
  --border: #2A2A33;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: var(--bg);
  color: var(--fg);
  font-family: "Noto Serif SC", "Source Han Serif SC", "Songti SC", "STSong", "SimSun", serif;
  font-size: 17px;
  line-height: 1.85;
  -webkit-font-smoothing: antialiased;
}
html { height: 100%; overscroll-behavior: none; }
body {
  height: 100vh; height: 100dvh;
  overflow: hidden;
  display: flex; flex-direction: column;
  padding: env(safe-area-inset-top) env(safe-area-inset-right) 0 env(safe-area-inset-left);
}

/* ============ Title screen ============ */
.title-screen {
  position: fixed; inset: 0;
  background: var(--bg);
  z-index: 100;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px 24px;
  overflow-y: auto;
}
.title-screen h1 {
  font-size: 36px; font-weight: 400;
  letter-spacing: 0.4em; margin: 0;
  color: var(--accent);
  text-shadow: 0 0 30px rgba(184, 58, 58, 0.3);
}
.title-screen .subtitle {
  font-size: 16px; color: var(--dim);
  letter-spacing: 0.3em;
  margin: 8px 0 40px;
}
.title-screen .acts {
  display: flex; flex-direction: column; gap: 12px;
  width: 100%; max-width: 360px;
}
.title-screen .acts button {
  appearance: none;
  background: var(--panel);
  color: var(--fg);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px 20px;
  font-family: inherit;
  font-size: 16px;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
  text-align: left;
  -webkit-tap-highlight-color: transparent;
}
.title-screen .acts button:active,
.title-screen .acts button:hover {
  background: var(--panel-hover);
  border-color: var(--accent);
}
.title-screen .acts button .meta {
  display: block;
  font-size: 13px; color: var(--dim);
  margin-top: 4px;
}
.title-screen .acts button.disabled {
  opacity: 0.5; cursor: not-allowed;
}
.title-screen .extras {
  margin-top: 32px;
  display: flex; flex-direction: column; gap: 14px;
  width: 100%; max-width: 360px;
  font-size: 14px; color: var(--dim);
}
.title-screen .extras details {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 14px;
}
.title-screen .extras summary {
  cursor: pointer; font-size: 13px;
  list-style: none;
  padding: 4px 0;
}
.title-screen .extras summary::-webkit-details-marker { display: none; }
.title-screen .extras summary::before { content: "▸ "; }
.title-screen .extras details[open] summary::before { content: "▾ "; }
.title-screen .extras details[open] { padding-bottom: 14px; }
.title-screen .extras input[type=text],
.title-screen .extras input[type=number] {
  background: var(--bg); color: var(--fg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 10px;
  font-family: inherit; font-size: 14px;
  width: 100%;
  margin-top: 6px;
}
.title-screen .extras .row {
  display: flex; gap: 8px; align-items: center;
  font-size: 13px; padding: 8px 0;
}
.title-screen .ach-link {
  appearance: none; background: transparent;
  color: var(--dim); border: 1px solid var(--border);
  border-radius: 6px; padding: 10px;
  font-family: inherit; font-size: 14px;
  cursor: pointer; text-align: center;
}
.title-screen .ach-link:hover { color: var(--fg); border-color: var(--accent); }
.title-screen .ach-link b { color: var(--gold); }
.title-screen .langs {
  margin-top: 24px; font-size: 13px;
}
.title-screen .langs a { color: var(--dim); margin: 0 8px; text-decoration: none; }
.title-screen .langs a:hover { color: var(--fg); }

/* ============ HUD ============ */
header.hud {
  flex: 0 0 auto;
  padding: 8px 14px;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  color: var(--dim);
  display: flex;
  flex-wrap: wrap;
  gap: 4px 10px;
  align-items: center;
  background: rgba(11, 11, 14, 0.95);
  backdrop-filter: blur(8px);
  position: sticky; top: 0; z-index: 10;
}
.stat { white-space: nowrap; position: relative; }
.stat b { color: var(--fg); font-weight: 500; }
.stat.warn b { color: var(--accent); }
.pc-chip {
  appearance: none;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--fg);
  border-radius: 6px;
  padding: 4px 9px 4px 7px;
  font-family: inherit;
  font-size: 12px;
  cursor: pointer;
  display: inline-flex; align-items: center; gap: 4px;
  -webkit-tap-highlight-color: transparent;
  transition: border-color 0.15s, background 0.15s;
}
.pc-chip:hover, .pc-chip:active { border-color: var(--accent); background: var(--panel); }
.pc-chip .icon { font-size: 11px; opacity: 0.7; }
.pc-chip b { color: var(--fg); font-weight: 500; }
.lang {
  margin-left: auto;
  color: var(--dim);
  text-decoration: none;
  border: 1px solid var(--border);
  padding: 2px 8px;
  border-radius: 6px;
  font-size: 12px;
}
.lang:hover { color: var(--fg); border-color: var(--accent); }
.ecology-bar {
  display: inline-flex; gap: 1px; vertical-align: middle;
  margin-left: 2px;
}
.ecology-bar .seg {
  width: 8px; height: 8px; border-radius: 1px;
  background: var(--dim2);
}
.ecology-bar .seg.on { background: var(--gold); }
.ecology-bar .seg.full { background: var(--accent); }

/* Floating delta */
.delta-pop {
  position: absolute;
  bottom: 100%; left: 50%;
  transform: translateX(-50%);
  font-size: 13px;
  font-weight: 600;
  pointer-events: none;
  animation: deltaFly 800ms ease-out forwards;
  z-index: 20;
}
.delta-pop.up { color: var(--accent); }
.delta-pop.down { color: var(--green); }
@keyframes deltaFly {
  0%   { opacity: 0; transform: translate(-50%, 0); }
  20%  { opacity: 1; }
  100% { opacity: 0; transform: translate(-50%, -28px); }
}

/* SAN vignette */
.vignette {
  position: fixed; inset: 0;
  pointer-events: none;
  background: radial-gradient(ellipse at center, transparent 30%, rgba(184, 58, 58, 0.55) 100%);
  opacity: 0; z-index: 5;
}
.vignette.flash { animation: sanFlash 800ms ease-out; }
@keyframes sanFlash {
  0%   { opacity: 0; }
  20%  { opacity: 1; }
  100% { opacity: 0; }
}

/* Achievement toast */
.ach-toast {
  position: fixed;
  top: calc(env(safe-area-inset-top) + 16px);
  left: 50%; transform: translateX(-50%) translateY(-12px);
  background: var(--panel);
  border: 1px solid var(--gold);
  border-radius: 10px;
  padding: 10px 16px;
  display: flex; align-items: center; gap: 10px;
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  max-width: 90vw;
  animation: toastIn 0.3s ease-out forwards, toastOut 0.4s 2.1s ease-in forwards;
}
.ach-toast .icon { font-size: 22px; }
.ach-toast .body .name { font-size: 14px; font-weight: 600; color: var(--gold); }
.ach-toast .body .desc { font-size: 12px; color: var(--dim); }
@keyframes toastIn { to { opacity: 1; transform: translateX(-50%) translateY(0); } }
@keyframes toastOut { to { opacity: 0; transform: translateX(-50%) translateY(-12px); } }

/* ============ Story ============ */
main {
  flex: 1 1 0;
  min-height: 0;
  height: 100%;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  touch-action: pan-y;
  padding: 18px 18px 8px;
  max-width: 720px; width: 100%;
  margin: 0 auto;
  /* iOS Safari iframe: force own scroll layer */
  transform: translateZ(0);
  -webkit-transform: translateZ(0);
}
#story p {
  margin: 0 0 1em 0;
  animation: fadeIn 0.6s ease-out;
}
#story p.speaker {
  color: var(--dim);
  font-size: 13px;
  margin-bottom: 0.2em;
  letter-spacing: 0.05em;
}
#story p.scene {
  color: var(--dim);
  font-size: 12px;
  font-style: italic;
  border-left: 2px solid var(--border);
  padding-left: 10px;
  margin: 1.4em 0 0.8em 0;
}
#story p.act {
  color: var(--accent);
  font-size: 13px;
  text-align: center;
  letter-spacing: 0.3em;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  padding: 0.6em 0;
  margin: 1.6em 0;
}
#story p.dice {
  font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  color: var(--dim);
  font-size: 13px;
  margin: 0.4em 0;
  letter-spacing: 0.02em;
}
#story p.dice.fail { color: #B07070; }
#story p.dice.fumble { color: var(--accent); font-weight: 600; }
#story p.dice.crit { color: var(--gold); font-weight: 600; }
#story p.end {
  text-align: center;
  font-weight: 600;
  font-size: 19px;
  margin: 2em 0 0.4em;
  letter-spacing: 0.2em;
  color: var(--accent);
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: none; }
}

/* ============ Choices ============ */
nav#choices {
  flex: 0 1 auto;
  max-height: 50vh; max-height: 50dvh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  touch-action: pan-y;
  padding: 12px 18px calc(env(safe-area-inset-bottom) + 16px);
  max-width: 720px; width: 100%;
  margin: 0 auto;
  display: flex; flex-direction: column; gap: 10px;
  border-top: 1px solid var(--border);
  background: var(--bg);
}
nav#choices button {
  appearance: none;
  background: var(--panel);
  color: var(--fg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  font-family: inherit;
  font-size: 16px;
  line-height: 1.5;
  text-align: left;
  min-height: 48px;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
  -webkit-tap-highlight-color: transparent;
}
nav#choices button:active,
nav#choices button:hover {
  background: var(--panel-hover);
  border-color: var(--accent);
}
nav#choices button.continue {
  text-align: center;
  font-size: 22px;
  letter-spacing: 0.4em;
  padding: 12px;
  color: var(--accent);
}
nav#choices .restart, nav#choices .next-act {
  background: transparent;
  border-color: var(--accent);
  color: var(--accent);
  text-align: center;
  font-weight: 600;
}

/* ============ Bottom sheet ============ */
.scrim {
  position: fixed; inset: 0;
  background: rgba(0, 0, 0, 0.55);
  backdrop-filter: blur(2px);
  z-index: 50; opacity: 0; pointer-events: none;
  transition: opacity 0.25s;
}
.sheet {
  position: fixed;
  left: 0; right: 0; bottom: 0;
  max-width: 720px; margin: 0 auto;
  background: var(--panel-2);
  border-radius: 18px 18px 0 0;
  border-top: 1px solid var(--border);
  z-index: 51;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(.2,.7,.2,1);
  max-height: 85vh; max-height: 85dvh;
  display: flex; flex-direction: column;
  padding-bottom: env(safe-area-inset-bottom);
}
.sheet.open { transform: none; }
.scrim.open { opacity: 1; pointer-events: auto; }
.sheet .handle {
  width: 40px; height: 4px;
  background: var(--dim2);
  border-radius: 2px;
  margin: 8px auto 4px;
  flex: 0 0 auto;
}
.sheet .tabs {
  display: flex; gap: 0;
  border-bottom: 1px solid var(--border);
  flex: 0 0 auto;
}
.sheet .tabs button {
  appearance: none; background: transparent; border: none;
  border-bottom: 2px solid transparent;
  color: var(--dim);
  font-family: inherit; font-size: 13px;
  padding: 12px 8px; flex: 1; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.sheet .tabs button.active {
  color: var(--fg);
  border-bottom-color: var(--accent);
}
.sheet .tab-content {
  overflow-y: auto;
  padding: 14px 18px 24px;
  -webkit-overflow-scrolling: touch;
  flex: 1 1 auto;
}
.sheet .tab-content.hidden { display: none; }
.sheet h2 { font-size: 18px; font-weight: 600; margin: 4px 0 2px; }
.sheet h3 {
  font-size: 12px; color: var(--dim); font-weight: 500;
  letter-spacing: 0.15em; margin: 16px 0 6px;
  padding-bottom: 4px; border-bottom: 1px solid var(--border);
}
.sheet .char-meta { font-size: 13px; color: var(--dim); margin: 0 0 6px; }
.stats-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 8px 12px;
  font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  font-size: 14px;
}
.stats-grid .pair { display: flex; justify-content: space-between; padding: 4px 8px; background: var(--panel); border-radius: 6px; }
.stats-grid .pair span:first-child { color: var(--dim); }
.stats-grid .pair span:last-child { color: var(--fg); font-weight: 600; }
.derived-grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 6px 12px;
  font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  font-size: 14px;
}
.derived-grid .pair { display: flex; justify-content: space-between; padding: 6px 10px; background: var(--panel); border-radius: 6px; }
.derived-grid .pair.live { border-left: 2px solid var(--accent); }
.derived-grid .pair span:first-child { color: var(--dim); }
.skills-list { display: flex; flex-direction: column; gap: 4px; font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; font-size: 14px; }
.skills-list .row { display: flex; justify-content: space-between; padding: 5px 10px; background: var(--panel); border-radius: 6px; }
.skills-list .row span:last-child { color: var(--fg); font-weight: 600; }
.notes { font-size: 14px; line-height: 1.7; color: var(--fg); }

/* Inventory */
.inventory-list {
  display: flex; flex-direction: column; gap: 4px; font-size: 14px;
}
.inventory-list .item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; background: var(--panel); border-radius: 6px;
}
.inventory-list .item .icon { font-size: 18px; }
.inventory-list .empty { color: var(--dim); font-style: italic; padding: 14px 0; text-align: center; }

/* Log */
.log-entry {
  background: var(--panel);
  border-radius: 8px;
  padding: 10px 12px;
  margin-bottom: 8px;
  font-size: 14px;
  border-left: 2px solid var(--border);
}
.log-entry .head {
  display: flex; justify-content: space-between; align-items: center;
  font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  font-size: 12px;
  color: var(--dim);
  margin-bottom: 3px;
}
.log-entry .skill { font-weight: 600; color: var(--fg); font-size: 14px; }
.log-entry .res { font-size: 12px; }
.log-entry .res.success { color: var(--green); }
.log-entry .res.fail { color: #B07070; }
.log-entry .res.fumble { color: var(--accent); font-weight: 600; }
.log-entry .res.crit { color: var(--gold); font-weight: 600; }
.log-entry .outcome { color: var(--fg); margin-top: 4px; line-height: 1.6; }
.log-entry.fumble { background: rgba(184, 58, 58, 0.08); border-left-color: var(--accent); }
.log-entry.crit { background: rgba(201, 163, 58, 0.08); border-left-color: var(--gold); }
.log-empty { color: var(--dim); font-style: italic; text-align: center; padding: 30px 10px; }

/* Companion cards */
.comp-card {
  background: var(--panel);
  border-radius: 8px;
  padding: 10px 14px;
  margin-bottom: 10px;
}
.comp-card summary {
  display: flex; justify-content: space-between; align-items: center;
  cursor: pointer; list-style: none;
  padding: 4px 0;
}
.comp-card summary::-webkit-details-marker { display: none; }
.comp-card summary .name { font-weight: 600; font-size: 15px; }
.comp-card summary .meta {
  font-size: 12px; color: var(--dim);
  font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}
.comp-card[open] summary { margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.comp-card .body { font-size: 13px; line-height: 1.6; }

/* Achievements */
.ach-summary {
  font-size: 13px; color: var(--dim);
  text-align: center;
  padding: 6px 0 12px;
}
.ach-summary b { color: var(--gold); font-size: 16px; }
.ach-list { display: flex; flex-direction: column; gap: 6px; }
.ach-item {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 10px 12px;
  background: var(--panel);
  border-radius: 8px;
  border-left: 2px solid var(--border);
  font-size: 13px;
}
.ach-item.unlocked { border-left-color: var(--gold); }
.ach-item.locked { opacity: 0.5; }
.ach-item .icon { font-size: 22px; flex: 0 0 auto; }
.ach-item .body { flex: 1; min-width: 0; }
.ach-item .name {
  font-weight: 600; font-size: 14px;
  color: var(--fg); margin-bottom: 2px;
}
.ach-item.unlocked .name { color: var(--gold); }
.ach-item.locked .name { color: var(--dim); }
.ach-item .desc { color: var(--dim); font-size: 12px; line-height: 1.5; }
.ach-item .progress {
  margin-top: 4px;
  height: 4px; background: var(--border); border-radius: 2px;
  overflow: hidden;
}
.ach-item .progress .fill { height: 100%; background: var(--gold); transition: width 0.4s; }
.ach-item .meta {
  font-size: 11px; color: var(--dim2);
  font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  margin-top: 2px;
}

.error { color: var(--accent); padding: 20px; text-align: center; font-size: 14px; }
.hidden { display: none !important; }
</style>
</head>
<body>

<!-- ============ Title screen ============ -->
<div class="title-screen" id="title-screen">
  <h1>控江往事</h1>
  <p class="subtitle">静默深渊</p>
  <div class="acts">
    <button data-act="0">
      序章 · 静默之夜
      <span class="meta">第一夜 · 30 分钟 · 已完成</span>
    </button>
    <button data-act="1">
      Act 1 · 困笼
      <span class="meta">第二天早晨 · 90 分钟 · 3F/4F 探索</span>
    </button>
    <button id="continue-saved" hidden>
      📂 继续上次进度
      <span class="meta" id="continue-meta"></span>
    </button>
  </div>
  <div class="extras">
    <details>
      <summary>设置</summary>
      <div class="row">
        <label>Seed: <input type="number" id="seed-input" placeholder="留空 = 随机"></label>
      </div>
      <div class="row" style="font-size:12px;color:var(--dim2)">用同一 seed 可复现同一局结果。URL ?seed=N 也可。</div>
    </details>
    <button class="ach-link" id="show-achievements">🏆 成就总览（<b id="ach-count">0</b> / <b id="ach-total">0</b>）</button>
  </div>
  <div class="langs">
    <a href="en/">English</a>
  </div>
</div>

<!-- ============ Game ============ -->
<div id="game" class="hidden">
  <header class="hud" id="hud">
    <button class="pc-chip" id="open-panel" aria-label="打开角色面板">
      <span class="icon">📋</span>
      <span>罗昕</span>
      <span>SAN <b id="san">—</b></span>
    </button>
    <span class="stat">你 <b id="fear-xin">—</b></span>
    <span class="stat">志勇 <b id="fear-zy">—</b></span>
    <span class="stat">张怡 <b id="fear-zy2">—</b></span>
    <span class="stat" id="loc-stat" hidden>📍 <b id="location-name">—</b></span>
    <span class="stat ecology-stat" id="ecology-stat" hidden>生态 <span class="ecology-bar" id="ecology-bar"></span></span>
    <span class="stat">回合 <b id="rounds">0</b></span>
    <a class="lang" href="en/">EN</a>
  </header>

  <main id="story" aria-live="polite"></main>
  <nav id="choices"></nav>
</div>

<div class="vignette" id="vignette"></div>
<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet" role="dialog" aria-modal="true">
  <div class="handle"></div>
  <div class="tabs">
    <button class="tab-btn active" data-tab="stats">属性</button>
    <button class="tab-btn" data-tab="log">检定记录</button>
    <button class="tab-btn" data-tab="comp">队友</button>
    <button class="tab-btn" data-tab="ach">成就</button>
  </div>
  <div class="tab-content" id="tab-stats">
    <h2 id="pc-name">罗昕 · 昕</h2>
    <p class="char-meta" id="pc-meta">高三学生（吃货/社交核心） · 17 岁 · 男</p>

    <h3>属性</h3>
    <div class="stats-grid" id="pc-stats"></div>

    <h3>状态</h3>
    <div class="derived-grid" id="pc-derived"></div>

    <h3>背包</h3>
    <div class="inventory-list" id="pc-inventory"></div>

// ============================================================
// localStorage helpers

function loadSave() {
  try { return JSON.parse(localStorage.getItem(SAVE_KEY)); } catch { return null; }
}
function setSave(data) { localStorage.setItem(SAVE_KEY, JSON.stringify(data)); }
function clearSave() { localStorage.removeItem(SAVE_KEY); }
function loadAchievements() {
  try { return JSON.parse(localStorage.getItem(ACH_KEY)) || { unlocked: {} }; }
  catch { return { unlocked: {} }; }
}

// ============================================================

function showError(msg) { storyEl.innerHTML = '<div class="error">' + msg + '</div>'; }
function escapeHTML(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function appendParagraph(text, cls) {
  const p = document.createElement("p");
  if (cls) p.className = cls;
  p.textContent = text;
  storyEl.appendChild(p);
  p.scrollIntoView({ behavior: "smooth", block: "end" });
  return p;
}

function renderHUD() {

    const el = document.getElementById(id);
    el.textContent = val;
    const stat = el.closest(".stat") || el.closest(".pc-chip");
    if (stat) {
      if (val >= 50) stat.classList.add("warn");
      else stat.classList.remove("warn");
    }
  };
  setFear("fear-xin", v["恐惧_昕"]);
  setFear("fear-zy", v["恐惧_志勇"]);
  setFear("fear-zy2", v["恐惧_张怡"]);
  document.getElementById("rounds").textContent = v["回合数"] || 0;
  if (sheet.classList.contains("open")) renderPanel();
  // Auto achievement detection
  detectAchievements();
}

function renderEcology(n) {

    const seg = document.createElement("span");
    seg.className = "seg" + (i <= n ? (n >= 7 ? " full" : " on") : "");

  }
  if (n > 0) stat.removeAttribute("hidden");
}

function setLocation(locId) {

  document.getElementById("location-name").textContent = name;

}

function showFloatingDelta(targetId, delta) {
  const target = document.getElementById(targetId);
  if (!target) return;
  const stat = target.closest(".stat") || target.closest(".pc-chip");
  if (!stat) return;
  const pop = document.createElement("span");
  pop.className = "delta-pop " + (delta > 0 ? "up" : "down");
  pop.textContent = (delta > 0 ? "+" : "") + delta;
  stat.appendChild(pop);
  setTimeout(() => pop.remove(), 850);
}

function flashSanVignette() {

// ============================================================
// Achievement system
// ============================================================
function unlockAchievement(id) {
  if (!ACHIEVEMENTS[id]) return;
  const data = loadAchievements();
  if (data.unlocked[id]) return;
  data.unlocked[id] = {
    date: new Date().toISOString(),
    seed: story ? story.variablesState["seed"] : null,
  };
  saveAchievements(data);
  showAchievementToast(id);
}

function showAchievementToast(id) {
  const a = ACHIEVEMENTS[id];
  if (!a) return;
  const t = document.createElement("div");
  t.className = "ach-toast";
  t.innerHTML =
    '<span class="icon">' + a.icon + '</span>' +
    '<div class="body"><div class="name">成就解锁：' + escapeHTML(a.name) + '</div>' +
    '<div class="desc">' + escapeHTML(a.desc) + '</div></div>';
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2600);
}

// 自动从游戏状态检测成就解锁
function detectAchievements() {
  if (!story) return;
  const v = story.variablesState;
  if (v["已进过泡面"]) unlockAchievement("noodle_contest");
  if (v["主厨刀_unlocked"]) unlockAchievement("knife_unlocked");
  if (v["当前伏笔"] && String(v["当前伏笔"]).includes("三档"))
    unlockAchievement("all_foreshadow");
  switch (v["战斗结局"]) {
    case 1: unlockAchievement("ending_victory"); break;
    case 2: unlockAchievement("ending_timeout"); break;
    case 3: unlockAchievement("ending_knockdown"); break;
    case 4: unlockAchievement("ending_escape"); break;
  }
  // Act 1
  if (v["锚点A_遭遇"]) {
    if (v["锚点A_id"] === "npc_lujianqiao") unlockAchievement("anchor_a_lu");
    if (v["锚点A_id"] === "npc_yaojunjie") unlockAchievement("anchor_a_yao");
  }
  if (v["生态置信度"] >= 5) unlockAchievement("ecology_local_b");
  if (v["Act1结束"]) {
    unlockAchievement("act1_complete");
    if (v["Act1出口路径"] === 2) unlockAchievement("climb_master");
  }
}

// ============================================================
// Tag handlers
// ============================================================
function handleStateTag(t) {
  const m = t.substring(6).match(/^([a-z_]+)([+-])(\d+)$/);
  if (!m) return;
  const [, varName, sign, num] = m;
  const delta = (sign === "+" ? 1 : -1) * parseInt(num, 10);
  const target = STATE_TARGETS[varName];
  if (!target) return;
  showFloatingDelta(target.id, delta);
  if (target.san) {
    flashSanVignette();
    if (delta <= -3) unlockAchievement("witness");
  }
}

function handleRollTag(t) {
  const parts = t.substring(5).split(",");
  if (parts.length < 4) return;
  pendingRoll = {
    round: story.variablesState["回合数"] || 0,
    skill: parts[0].trim(),
    value: parseInt(parts[1], 10),
    roll: parseInt(parts[2], 10),
    level: parseInt(parts[3], 10),
    outcome: ""
  };
  if (pendingRoll.level === 0) unlockAchievement("first_fumble");
  if (pendingRoll.level === 5) unlockAchievement("first_crit");
}

function commitPendingRoll(outcome) {
  if (!pendingRoll) return;
  pendingRoll.outcome = outcome || "";
  rollLog.unshift(pendingRoll);
  pendingRoll = null;
  renderLog();
}

function handleEcologyTag(t) {
  const n = parseInt(t.substring(8), 10);
  if (isNaN(n)) return;
  if (n > lastEcology) {
    lastEcology = n;
    renderEcology(n);
  }
}

function handleLocationTag(t) {
  const loc = t.substring(9).trim();
  if (loc !== lastLocation) {
    lastLocation = loc;
    setLocation(loc);
  }
}

function handleAchievementTag(t) {
  const id = t.substring(12).trim();
  unlockAchievement(id);
}

// ============================================================
// Story driver
// ============================================================
function continueStory() {
  while (story.canContinue) {
    const text = story.Continue().trim();
    const tags = story.currentTags || [];

    let speaker = null, scene = null, act = null;
    for (const t of tags) {
      if (t.startsWith("speaker:")) speaker = t.substring(8).trim();
      else if (t.startsWith("scene:")) scene = t.substring(6).trim();
      else if (t.startsWith("act:")) act = t.substring(4).trim();
      else if (t.startsWith("state:")) handleStateTag(t);
      else if (t.startsWith("roll:")) handleRollTag(t);
      else if (t.startsWith("ecology:")) handleEcologyTag(t);
      else if (t.startsWith("location:")) handleLocationTag(t);
      else if (t.startsWith("achievement:")) handleAchievementTag(t);
    }

    if (act && act !== lastAct) {
      appendParagraph(ACT_LABELS[act] || ("Act " + act), "act");
      lastAct = act;
    }
    if (scene && scene !== lastScene) {
      appendParagraph("〔" + (SCENE_LABELS[scene] || scene) + "〕", "scene");
      lastScene = scene;
    }
    if (speaker && speaker !== lastSpeaker) {
      appendParagraph(SPEAKER_LABELS[speaker] || speaker, "speaker");
      lastSpeaker = speaker;
    }
    if (text) {
      const isDice = /^〔.+〕$/.test(text);
      const isEnd = tags.some(t => t.startsWith("CLASS:end") || t.startsWith("CLASS: end"));
      let cls = null;
      if (isEnd) cls = "end";
      else if (isDice) {
        cls = "dice";
        if (pendingRoll) {
          if (pendingRoll.level === 0) cls += " fumble";
          else if (pendingRoll.level === 5) cls += " crit";
          else if (pendingRoll.level === 1) cls += " fail";
        }
      }
      appendParagraph(text, cls);
      if (pendingRoll && !isDice) commitPendingRoll(text);
    }
    if (!speaker) lastSpeaker = null;
  }
  if (pendingRoll && pendingRoll.outcome === "") commitPendingRoll("");
  renderHUD();
  renderChoices();
}

function renderChoices() {
  choicesEl.innerHTML = "";
  if (story.currentChoices.length === 0) {
    // Story ended
    onStoryEnd();
    return;
  }
  story.currentChoices.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.textContent = choice.text;
    if (choice.text === "→") btn.classList.add("continue");
    btn.onclick = () => {
      story.ChooseChoiceIndex(i);
      lastSpeaker = null;
      continueStory();
    };
    choicesEl.appendChild(btn);
  });
}

function onStoryEnd() {
  // Save state for cross-act transfer
  const v = story.variablesState;
  const vars = {};
  TRANSFER_VARS.forEach(k => { try { vars[k] = v[k]; } catch {} });

  // Decide what to offer
  const canContinue = (currentAct === 0); // After Act 0, offer Act 1
  if (canContinue) {
    setSave({ act: 1, fromAct: 0, vars, ts: Date.now() });
    const btn = document.createElement("button");
    btn.className = "next-act";
    btn.textContent = "进入 Act 1「困笼」";
    btn.onclick = () => location.href = "?act=1&continue=1";
    choicesEl.appendChild(btn);
  }
  if (currentAct === 1 && story.variablesState["Act1结束"]) {
    const note = document.createElement("button");
    note.className = "next-act";
    note.textContent = "Act 2 即将到来…";
    note.disabled = true;
    note.style.opacity = 0.6;
    choicesEl.appendChild(note);
  }
  const restart = document.createElement("button");
  restart.className = "restart";
  restart.textContent = "返回主菜单";
  restart.onclick = () => { clearSave(); location.href = "."; };
  choicesEl.appendChild(restart);
}

  const items = [];
  // 序章物品 (boolean unlocked)
  if (v["主厨刀_unlocked"]) items.push("主厨刀");
  if (v["主厨刀_unlocked"] && !v["辣椒面_used"]) items.push("辣椒面");
  // Act 1 背包 (LIST)
  try {
    const bagStr = String(v["背包"] || "");
    if (bagStr.includes("急救包")) items.push("急救包");
    if (bagStr.includes("绷带")) items.push("绷带");
    if (bagStr.includes("宿管钥匙")) items.push("宿管钥匙");
    if (bagStr.includes("数学草稿本")) items.push("数学草稿本");
    if (bagStr.includes("防疫手册")) items.push("防疫手册");
  } catch {}

  if (items.length === 0) {
    el.innerHTML = '<div class="empty">— 空 —</div>';
    return;
  }
  items.forEach(it => {
    const meta = ITEM_LABELS[it] || { icon: "📦", desc: "" };
    el.insertAdjacentHTML("beforeend",
      '<div class="item"><span class="icon">' + meta.icon + '</span>' +
      '<div><div style="font-weight:600">' + escapeHTML(it) + '</div>' +
      '<div style="color:var(--dim);font-size:12px">' + escapeHTML(meta.desc) + '</div></div></div>');
  });
}

function renderCompanions() {
  const el = document.getElementById("comp-list");
  el.innerHTML = "";
  const v = story ? story.variablesState : {};
  COMPANIONS.forEach((c) => {
    const fearVal = c.fearVar ? v[c.fearVar] : null;
    const trustVal = c.trustVar ? v[c.trustVar] : null;
    const meta = (fearVal !== null && fearVal !== undefined)
      ? "恐惧 " + fearVal + " · 信任 " + trustVal
      : "—";
    const skillsHtml = c.skills.map(([n, s]) =>
      '<div class="row"><span>' + n + '</span><span>' + s + '</span></div>').join("");
    const statsHtml = Object.entries(c.stats).map(([k, val]) =>
      '<div class="pair"><span>' + k + '</span><span>' + val + '</span></div>').join("");
    const derivedHtml = Object.entries(c.derived).map(([k, val]) =>
      '<div class="pair"><span>' + k + '</span><span>' + val + '</span></div>').join("");
    el.insertAdjacentHTML("beforeend",
      '<details class="comp-card">' +
      '<summary><span class="name">' + c.name + ' · ' + c.role + '</span><span class="meta">' + meta + '</span></summary>' +
      '<div class="body">' +
      '<p style="color:var(--dim);font-size:12px;margin:0 0 8px">' + c.occupation + ' · ' + c.age + ' 岁</p>' +
      '<h3 style="margin-top:4px">属性</h3><div class="stats-grid">' + statsHtml + '</div>' +
      '<h3>状态</h3><div class="derived-grid">' + derivedHtml + '</div>' +
      '<h3>技能</h3><div class="skills-list">' + skillsHtml + '</div>' +
      '<h3>简介</h3><p style="font-size:13px;line-height:1.6">' + c.notes + '</p>' +
      '</div></details>');
  });
}

function renderLog() {
  if (rollLog.length === 0) {
    logListEl.innerHTML = '<div class="log-empty">暂无检定记录</div>';
    return;
  }
  logListEl.innerHTML = "";
  rollLog.forEach(e => {
    const cls = LEVEL_CLASS[e.level] || "";
    const div = document.createElement("div");
    div.className = "log-entry " + (cls === "fumble" || cls === "crit" ? cls : "");
    const symbol = e.level === 0 ? "✗✗" : e.level === 1 ? "✗" : e.level === 5 ? "✓✓" : "✓";
    div.innerHTML =
      '<div class="head"><span>[回合 ' + e.round + ']</span>' +
      '<span class="res ' + cls + '">' + symbol + ' ' + LEVEL_NAMES[e.level] + '</span></div>' +
      '<div class="skill">' + escapeHTML(e.skill) + ' ' + e.value + ' · 骰 ' + e.roll + '</div>' +
      (e.outcome ? '<div class="outcome">' + escapeHTML(e.outcome) + '</div>' : '');
    logListEl.appendChild(div);
  });
}

function renderAchievementsTab() {
  const data = loadAchievements();
  const ids = Object.keys(ACHIEVEMENTS);
  const unlocked = ids.filter(id => data.unlocked[id]);
  document.getElementById("ach-unlocked-num").textContent = unlocked.length;
  document.getElementById("ach-total-num").textContent = ids.length;

  const list = document.getElementById("ach-list");
  list.innerHTML = "";
  ids.forEach(id => {
    const a = ACHIEVEMENTS[id];
    const got = data.unlocked[id];
    const div = document.createElement("div");
    div.className = "ach-item " + (got ? "unlocked" : "locked");
    let metaLine = "";
    if (got) {
      const date = new Date(got.date).toLocaleDateString("zh-CN");
      metaLine = "<div class='meta'>" + date + (got.seed ? " · seed " + got.seed : "") + "</div>";
    }
    div.innerHTML =
      '<span class="icon">' + (got ? a.icon : "🔒") + '</span>' +
      '<div class="body">' +
      '<div class="name">' + escapeHTML(a.name) + '</div>' +
      '<div class="desc">' + escapeHTML(a.desc) + '</div>' +
      metaLine +
      '</div>';
    list.appendChild(div);
  });
}

// ============================================================
// Panel control
// ============================================================
function openPanel() {
  renderPanel();
  renderLog();
  renderAchievementsTab();
  sheet.classList.add("open");
  scrim.classList.add("open");
}
function closePanel() {
  sheet.classList.remove("open");
  scrim.classList.remove("open");
}
document.getElementById("open-panel").onclick = openPanel;
scrim.onclick = closePanel;

document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    const target = btn.dataset.tab;
    ["stats", "log", "comp", "ach"].forEach(t => {
      document.getElementById("tab-" + t).classList.toggle("hidden", target !== t);
    });
    if (target === "ach") renderAchievementsTab();
  };
});
document.addEventListener("keydown", e => {
  if (e.key === "Escape" && sheet.classList.contains("open")) closePanel();
});

// ============================================================
// Title screen logic
// ============================================================
function refreshTitleScreen() {
  // Achievement count
  const data = loadAchievements();
  const total = Object.keys(ACHIEVEMENTS).length;
  const unlocked = Object.keys(data.unlocked || {}).length;
  document.getElementById("ach-count").textContent = unlocked;
  document.getElementById("ach-total").textContent = total;

  // Continue saved
  const save = loadSave();
  const cont = document.getElementById("continue-saved");
  if (save && save.act === 1) {
    cont.removeAttribute("hidden");
    document.getElementById("continue-meta").textContent =
      "Act " + save.act + " · " + new Date(save.ts).toLocaleString("zh-CN");
    cont.onclick = () => location.href = "?act=" + save.act + "&continue=1";
  }
}
refreshTitleScreen();

document.querySelectorAll(".acts button[data-act]").forEach(btn => {
  btn.onclick = () => {
    const act = parseInt(btn.dataset.act, 10);
    const seedInput = document.getElementById("seed-input").value;
    const params = new URLSearchParams();
    params.set("act", act);
    if (seedInput) params.set("seed", seedInput);
    location.href = "?" + params.toString();
  };
});

document.getElementById("show-achievements").onclick = () => {
  // Open game shell view briefly to show achievements panel
  // Simpler: just open the panel inline using a faux story-less mode
  renderAchievementsTab();
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.querySelector('.tab-btn[data-tab="ach"]').classList.add("active");
  ["stats", "log", "comp", "ach"].forEach(t => {
    document.getElementById("tab-" + t).classList.toggle("hidden", t !== "ach");
  });
  sheet.classList.add("open");
  scrim.classList.add("open");
};

// ============================================================
// Game start (URL ?act=N)
// ============================================================
async function startGame(act, seedOverride, continueFromSave) {
  currentAct = act;
  const url = `kongjiang_act${act}.json`;
  try {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error("Failed to load " + url + ": " + resp.status);
    storyJson = await resp.text();
    story = new inkjs.Story(storyJson);

    // Seed injection (Act 1 supports it natively; Act 0 has hardcoded seed but can override)
    if (seedOverride) {
      try { story.variablesState["seed"] = parseInt(seedOverride, 10); } catch {}
    }

    // Continue from saved state
    if (continueFromSave) {
      const save = loadSave();
      if (save && save.vars) {
        for (const [k, val] of Object.entries(save.vars)) {
          try { story.variablesState[k] = val; } catch {}
        }
      }
    }

    titleScreen.classList.add("hidden");
    gameEl.classList.remove("hidden");
    continueStory();
  } catch (e) {
    titleScreen.classList.remove("hidden");
    showError("加载失败：" + e.message);
    console.error(e);
  }
}

// Bootstrap from URL
const urlParams = new URLSearchParams(location.search);
const requestedAct = urlParams.get("act");
const requestedSeed = urlParams.get("seed");
const isContinue = urlParams.get("continue") === "1";

if (requestedAct !== null) {
  startGame(parseInt(requestedAct, 10) || 0, requestedSeed, isContinue);
}
// Otherwise stay on title screen
</script>
