<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0B0B0E">
<title>Kongjiang Lockdown · Prologue</title>
<style>
:root {
  --bg: #0B0B0E;
  --fg: #E8E0CC;
  --dim: #8A8478;
  --dim2: #5A554C;
  --accent: #B83A3A;
  --gold: #C9A33A;
  --panel: #16161B;
  --panel-hover: #22222A;
  --panel-2: #1F1F26;
  --border: #2A2A33;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: var(--bg);
  color: var(--fg);
  font-family: "EB Garamond", "Iowan Old Style", "Palatino", Georgia, serif;
  font-size: 17px;
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
}
html { height: 100%; overscroll-behavior: none; }
body {
  height: 100%;
  overflow: hidden;
  display: flex; flex-direction: column;
  padding: env(safe-area-inset-top) env(safe-area-inset-right) 0 env(safe-area-inset-left);
}
#game {
  flex: 1 1 0;
  min-height: 0;
  display: flex; flex-direction: column;
}
#game.hidden { display: none; }

header.hud {
  flex: 0 0 auto;
  padding: 8px 14px;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  color: var(--dim);
  display: flex;
  flex-wrap: wrap;
  gap: 4px 10px;
  align-items: center;
  background: rgba(11, 11, 14, 0.95);
  backdrop-filter: blur(8px);
  position: sticky; top: 0; z-index: 10;
}
.stat { white-space: nowrap; position: relative; }
.stat b { color: var(--fg); font-weight: 500; }
.stat.warn b { color: var(--accent); }
.pc-chip {
  appearance: none;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--fg);
  border-radius: 6px;
  padding: 4px 9px 4px 7px;
  font-family: inherit;
  font-size: 12px;
  cursor: pointer;
  display: inline-flex; align-items: center; gap: 4px;
  -webkit-tap-highlight-color: transparent;
  transition: border-color 0.15s, background 0.15s;
}
.pc-chip:hover, .pc-chip:active { border-color: var(--accent); background: var(--panel); }
.pc-chip .icon { font-size: 11px; opacity: 0.7; }
.pc-chip b { color: var(--fg); font-weight: 500; }
.lang {
  margin-left: auto;
  color: var(--dim);
  text-decoration: none;
  border: 1px solid var(--border);
  padding: 2px 8px;
  border-radius: 6px;
  font-size: 12px;
}
.lang:hover { color: var(--fg); border-color: var(--accent); }

.delta-pop {
  position: absolute;
  bottom: 100%; left: 50%;
  transform: translateX(-50%);
  font-size: 13px;
  font-weight: 600;
  pointer-events: none;
  animation: deltaFly 800ms ease-out forwards;
  z-index: 20;
}
.delta-pop.up { color: var(--accent); }
.delta-pop.down { color: #6BAA5C; }
@keyframes deltaFly {
  0%   { opacity: 0; transform: translate(-50%, 0); }
  20%  { opacity: 1; }
  100% { opacity: 0; transform: translate(-50%, -28px); }
}

.vignette {
  position: fixed; inset: 0;
  pointer-events: none;
  background: radial-gradient(ellipse at center, transparent 30%, rgba(184, 58, 58, 0.55) 100%);
  opacity: 0; z-index: 5;
}
.vignette.flash { animation: sanFlash 800ms ease-out; }
@keyframes sanFlash {
  0%   { opacity: 0; }
  20%  { opacity: 1; }
  100% { opacity: 0; }
}

main {
  flex: 1 1 0;
  min-height: 0;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  touch-action: pan-y;
  padding: 18px 18px 8px;
  max-width: 720px; width: 100%;
  margin: 0 auto;
  transform: translateZ(0);
  -webkit-transform: translateZ(0);
}
#story p {
  margin: 0 0 1em 0;
  animation: fadeIn 0.6s ease-out;
}
#story p.speaker {
  color: var(--dim);
  font-size: 13px;
  margin-bottom: 0.2em;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
#story p.scene {
  color: var(--dim);
  font-size: 12px;
  font-style: italic;
  border-left: 2px solid var(--border);
  padding-left: 10px;
  margin: 1.4em 0 0.8em 0;
}
#story p.act {
  color: var(--accent);
  font-size: 13px;
  text-align: center;
  letter-spacing: 0.3em;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  padding: 0.6em 0;
  margin: 1.6em 0;
}
#story p.dice {
  font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  color: var(--dim);
  font-size: 13px;
  margin: 0.4em 0;
  letter-spacing: 0.02em;
}
#story p.dice.fail { color: #B07070; }
#story p.dice.fumble { color: var(--accent); font-weight: 600; }
#story p.dice.crit { color: var(--gold); font-weight: 600; }
#story p.end {
  text-align: center;
  font-weight: 600;
  font-size: 19px;
  margin: 2em 0 0.4em;
  letter-spacing: 0.15em;
  color: var(--accent);
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: none; }
}

nav#choices {
  flex: 0 1 auto;
  max-height: 50%;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  touch-action: pan-y;
  padding: 12px 18px calc(env(safe-area-inset-bottom) + 16px);
  max-width: 720px; width: 100%;
  margin: 0 auto;
  display: flex; flex-direction: column; gap: 10px;
  border-top: 1px solid var(--border);
  background: var(--bg);
}
nav#choices button {
  appearance: none;
  background: var(--panel);
  color: var(--fg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  font-family: inherit;
  font-size: 16px;
  line-height: 1.5;
  text-align: left;
  min-height: 48px;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
  -webkit-tap-highlight-color: transparent;
}
@media (max-width: 600px) {
  nav#choices { gap: 6px; padding-top: 8px; max-height: 42%; }
  nav#choices button {
    padding: 9px 12px;
    font-size: 14px;
    line-height: 1.35;
    min-height: 40px;
    border-radius: 8px;
  }
  nav#choices button.continue { font-size: 18px; padding: 8px; }
}
nav#choices button:active,
nav#choices button:hover {
  background: var(--panel-hover);
  border-color: var(--accent);
}
nav#choices button.continue {
  text-align: center;
  font-size: 22px;
  letter-spacing: 0.4em;
  padding: 12px;
  color: var(--accent);
}
nav#choices .restart {
  background: transparent;
  border-color: var(--accent);
  color: var(--accent);
  text-align: center;
}

.scrim {
  position: fixed; inset: 0;
  background: rgba(0, 0, 0, 0.55);
  backdrop-filter: blur(2px);
  z-index: 50; opacity: 0; pointer-events: none;
  transition: opacity 0.25s;
}
.sheet {
  position: fixed;
  left: 0; right: 0; bottom: 0;
  max-width: 720px; margin: 0 auto;
  background: var(--panel-2);
  border-radius: 18px 18px 0 0;
  border-top: 1px solid var(--border);
  z-index: 51;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(.2,.7,.2,1);
  max-height: 85vh; max-height: 85dvh;
  display: flex; flex-direction: column;
  padding-bottom: env(safe-area-inset-bottom);
}
.sheet.open { transform: none; }
.scrim.open { opacity: 1; pointer-events: auto; }
.sheet .handle {
  width: 40px; height: 4px;
  background: var(--dim2);
  border-radius: 2px;
  margin: 8px auto 4px;
  flex: 0 0 auto;
}
.sheet .tabs {
  display: flex; gap: 0;
  border-bottom: 1px solid var(--border);
  flex: 0 0 auto;
}
.sheet .tabs button {
  appearance: none; background: transparent; border: none;
  border-bottom: 2px solid transparent;
  color: var(--dim);
  font-family: inherit; font-size: 14px;
  padding: 12px 16px; flex: 1; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.sheet .tabs button.active {
  color: var(--fg);
  border-bottom-color: var(--accent);
}
.sheet .tab-content {
  overflow-y: auto;
  padding: 14px 18px 24px;
  -webkit-overflow-scrolling: touch;
  flex: 1 1 auto;
}
.sheet .tab-content.hidden { display: none; }
.sheet h2 { font-size: 18px; font-weight: 600; margin: 4px 0 2px; }
.sheet h3 {
  font-size: 12px; color: var(--dim); font-weight: 500;
  letter-spacing: 0.15em; margin: 16px 0 6px;
  padding-bottom: 4px; border-bottom: 1px solid var(--border);
  text-transform: uppercase;
}
.sheet .char-meta { font-size: 13px; color: var(--dim); margin: 0 0 6px; }
.stats-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 8px 12px;
  font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  font-size: 14px;
}
.stats-grid .pair { display: flex; justify-content: space-between; padding: 4px 8px; background: var(--panel); border-radius: 6px; }
.stats-grid .pair span:first-child { color: var(--dim); }
.stats-grid .pair span:last-child { color: var(--fg); font-weight: 600; }
.derived-grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 6px 12px;
  font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  font-size: 14px;
}
.derived-grid .pair { display: flex; justify-content: space-between; padding: 6px 10px; background: var(--panel); border-radius: 6px; }
.derived-grid .pair.live { border-left: 2px solid var(--accent); }
.derived-grid .pair span:first-child { color: var(--dim); }
.skills-list { display: flex; flex-direction: column; gap: 4px; font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; font-size: 14px; }
.skills-list .row { display: flex; justify-content: space-between; padding: 5px 10px; background: var(--panel); border-radius: 6px; }
.skills-list .row span:last-child { color: var(--fg); font-weight: 600; }
.notes { font-size: 14px; line-height: 1.7; color: var(--fg); }

.log-entry {
  background: var(--panel);
  border-radius: 8px;
  padding: 10px 12px;
  margin-bottom: 8px;
  font-size: 14px;
  border-left: 2px solid var(--border);
}
.log-entry .head {
  display: flex; justify-content: space-between; align-items: center;
  font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  font-size: 12px;
  color: var(--dim);
  margin-bottom: 3px;
}
.log-entry .skill { font-weight: 600; color: var(--fg); font-size: 14px; }
.log-entry .res { font-size: 12px; }
.log-entry .res.success { color: #6BAA5C; }
.log-entry .res.fail { color: #B07070; }
.log-entry .res.fumble { color: var(--accent); font-weight: 600; }
.log-entry .res.crit { color: var(--gold); font-weight: 600; }
.log-entry .outcome { color: var(--fg); margin-top: 4px; line-height: 1.6; }
.log-entry.fumble { background: rgba(184, 58, 58, 0.08); border-left-color: var(--accent); }
.log-entry.crit { background: rgba(201, 163, 58, 0.08); border-left-color: var(--gold); }
.log-empty { color: var(--dim); font-style: italic; text-align: center; padding: 30px 10px; }

.comp-card {
  background: var(--panel);
  border-radius: 8px;
  padding: 10px 14px;
  margin-bottom: 10px;
}
.comp-card summary {
  display: flex; justify-content: space-between; align-items: center;
  cursor: pointer; list-style: none;
  padding: 4px 0;
}
.comp-card summary::-webkit-details-marker { display: none; }
.comp-card summary .name { font-weight: 600; font-size: 15px; }
.comp-card summary .meta {
  font-size: 12px; color: var(--dim);
  font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}
.comp-card[open] summary { margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.comp-card .body { font-size: 13px; line-height: 1.6; }

.error { color: var(--accent); padding: 20px; text-align: center; font-size: 14px; }
</style>
</head>
<body>

<header class="hud" id="hud">
  <button class="pc-chip" id="open-panel" aria-label="Open character panel">
    <span class="icon">📋</span>
    <span>Luo Xin</span>
    <span>SAN <b id="san">—</b></span>
  </button>
  <span class="stat">Your fear <b id="fear-xin">—</b></span>
  <span class="stat">Zhiyong <b id="fear-zy">—</b></span>
  <span class="stat">Zhangyi <b id="fear-zy2">—</b></span>
  <span class="stat">Round <b id="rounds">0</b></span>
  <a class="lang" href="../index.html">中</a>
</header>

<main id="story" aria-live="polite"></main>
<nav id="choices"></nav>

<div class="vignette" id="vignette"></div>
<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet" role="dialog" aria-modal="true">
  <div class="handle"></div>
  <div class="tabs">
    <button class="tab-btn active" data-tab="stats">Stats</button>
    <button class="tab-btn" data-tab="log">Skill Log</button>
    <button class="tab-btn" data-tab="comp">Companions</button>
  </div>
  <div class="tab-content" id="tab-stats">
    <h2 id="pc-name">Luo Xin · "Xin"</h2>
    <p class="char-meta" id="pc-meta">High school senior (foodie / social hub) · 17 · Male</p>

    <h3>Attributes</h3>
    <div class="stats-grid" id="pc-stats"></div>

    <h3>Status</h3>
    <div class="derived-grid" id="pc-derived"></div>

    <h3>Skills</h3>
    <div class="skills-list" id="pc-skills"></div>

    <h3>Bio</h3>
    <p class="notes" id="pc-notes"></p>
  </div>
  <div class="tab-content hidden" id="tab-log">
    <div id="log-list"></div>
  </div>
  <div class="tab-content hidden" id="tab-comp">
    <div id="comp-list"></div>
  </div>
</div>

<script src="https://unpkg.com/inkjs@2.3.1/dist/ink.js"></script>
<script>
const PC_DATA = {
  fullname: "Luo Xin",
  name: "Xin",
  occupation: "High school senior (foodie / social hub)",
  age: 17, gender: "Male",
  stats: { STR: 65, CON: 55, SIZ: 65, DEX: 70, APP: 65, INT: 65, POW: 70, EDU: 55, LUK: 75 },
  derived: { HP_max: 12, MP_max: 14, SAN_max: 99, Build: 0, DB: "0", MOV: 9 },
  skills: [
    ["Spot Hidden", 80], ["Listen", 65], ["Persuade", 65],
    ["Fighting (Brawl)", 45], ["Climb", 55], ["Throw", 50],
    ["Stealth", 45], ["First Aid", 35], ["Luck", 75]
  ],
  notes: "A slightly chubby foodie, the social hub of the dorm and the loudest voice in the room. Casual on the surface — actually the fastest runner of the four. Raised on a strange mix of obscure horror cinema and Lu Xun, he holds up unusually well around blood and gore. Deeply influenced by wuxia novels, fiercely loyal — the 302 brothers are his blood-sworn family. Dreams of going to Le Cordon Bleu in Paris. Has a near-supernatural sense of smell for meat. The chef knife is his secret."
};

const COMPANIONS = [
  {
    name: "Yanbo", role: "Resident", age: 17, gender: "Male",
    occupation: "High school senior (gym addict / slob)",
    stats: { STR: 75, CON: 50, SIZ: 70, DEX: 65, APP: 55, INT: 80, POW: 60, EDU: 55, LUK: 45 },
    derived: { HP: 12, MP: 12, SAN: 60, Build: 1, DB: "+1D4", MOV: 8 },
    skills: [["Fighting (Brawl)", 65], ["Throw", 55], ["Climb", 55], ["Spot Hidden", 65], ["Listen", 50], ["Persuade", 55], ["Library Use", 60], ["Computer Use", 35], ["First Aid", 25]],
    notes: "The strongest fighter in the dorm — dumbbells and raw explosive power. Sharp mind, excellent at language; in a crisis he is the first to articulate the actual problem.",
    fearVar: null
  },
  {
    name: "Zhiyong", role: "Visitor", age: 18, gender: "Male",
    occupation: "High school senior (closeted nerd / police family)",
    stats: { STR: 85, CON: 70, SIZ: 90, DEX: 60, APP: 50, INT: 55, POW: 60, EDU: 50, LUK: 50 },
    derived: { HP: 16, MP: 12, SAN: 60, Build: 2, DB: "+1D6", MOV: 9 },
    skills: [["Fighting (Brawl)", 55], ["Climb", 65], ["Jump", 60], ["Throw", 50], ["Spot Hidden", 60], ["Listen", 55], ["Computer Use", 65], ["Electrical Repair", 40]],
    notes: "1.9 m silent giant. Looks like the most able fighter, inwardly the one who needs the most protecting — terrified of horror. Deep nerd: anime, video games, Terraria-completionist. His father has trained him in police-grade restraint moves.",
    fearVar: "fear_zhiyong", trustVar: "trust_zhiyong"
  },
  {
    name: "Zhangyi", role: "Visitor", age: 17, gender: "Male",
    occupation: "High school senior (math prodigy / WoW veteran)",
    stats: { STR: 40, CON: 50, SIZ: 55, DEX: 60, APP: 65, INT: 85, POW: 70, EDU: 65, LUK: 45 },
    derived: { HP: 10, MP: 14, SAN: 70, Build: 0, DB: "0", MOV: 8 },
    skills: [["Computer Use", 70], ["Library Use", 60], ["Spot Hidden", 65], ["Listen", 65], ["Persuade", 55], ["Fighting (Brawl)", 25], ["Stealth", 40], ["Occult", 35]],
    notes: "Math prodigy with an almost supernatural intuition for numbers and patterns. His gossip antenna is always on. Came over with a fully-charged power bank — about to become the team's most important resource.",
    fearVar: "fear_zhangyi", trustVar: "trust_zhangyi"
  }
];

const SCENE_LABELS = { dorm_302: "Dorm 302" };
const SPEAKER_LABELS = { player: "You", xin: "Xin", zhiyong: "Zhiyong", zhangyi: "Zhangyi", yanbo: "Yanbo" };
const ACT_LABELS = { "0": "Act 0 · Prologue", "1": "Act 1 · The Cage" };

const STATE_TARGETS = {
  san_xin:        { id: "san",       label: "SAN", san: true },
  fear_xin:       { id: "fear-xin",  label: "Your fear" },
  fear_zhiyong:   { id: "fear-zy",   label: "Zhiyong fear" },
  fear_zhangyi:   { id: "fear-zy2",  label: "Zhangyi fear" },
};

const LEVEL_NAMES = ["Fumble!", "Fail", "Success", "Hard Success", "Extreme Success", "Critical!"];
const LEVEL_CLASS = ["fumble", "fail", "success", "success", "success", "crit"];

const storyEl = document.getElementById("story");
const choicesEl = document.getElementById("choices");
const sheet = document.getElementById("sheet");
const scrim = document.getElementById("scrim");
const vignetteEl = document.getElementById("vignette");
const logListEl = document.getElementById("log-list");

let storyJson = null;
let story = null;
let lastScene = null, lastSpeaker = null, lastAct = null;
let pendingRoll = null;
const rollLog = [];

function showError(msg) { storyEl.innerHTML = '<div class="error">' + msg + '</div>'; }

function appendParagraph(text, cls) {
  const p = document.createElement("p");
  if (cls) p.className = cls;
  p.textContent = text;
  storyEl.appendChild(p);
  p.scrollIntoView({ behavior: "smooth", block: "end" });
  return p;
}

function renderHUD() {
  const v = story.variablesState;
  document.getElementById("san").textContent = v["san_xin"];
  const setFear = (id, val) => {
    const el = document.getElementById(id);
    el.textContent = val;
    const stat = el.closest(".stat") || el.closest(".pc-chip");
    if (stat) {
      if (val >= 50) stat.classList.add("warn");
      else stat.classList.remove("warn");
    }
  };
  setFear("fear-xin", v["fear_xin"]);
  setFear("fear-zy", v["fear_zhiyong"]);
  setFear("fear-zy2", v["fear_zhangyi"]);
  document.getElementById("rounds").textContent = v["round_count"];
  if (sheet.classList.contains("open")) renderPanel();
}

function showFloatingDelta(targetId, delta) {
  const target = document.getElementById(targetId);
  if (!target) return;
  const stat = target.closest(".stat") || target.closest(".pc-chip");
  if (!stat) return;
  const pop = document.createElement("span");
  pop.className = "delta-pop " + (delta > 0 ? "up" : "down");
  pop.textContent = (delta > 0 ? "+" : "") + delta;
  stat.appendChild(pop);
  setTimeout(() => pop.remove(), 850);
}

function flashSanVignette() {
  vignetteEl.classList.remove("flash");
  void vignetteEl.offsetWidth;
  vignetteEl.classList.add("flash");
}

function handleStateTag(t) {
  const m = t.substring(6).match(/^([a-z_]+)([+-])(\d+)$/);
  if (!m) return;
  const [, varName, sign, num] = m;
  const delta = (sign === "+" ? 1 : -1) * parseInt(num, 10);
  const target = STATE_TARGETS[varName];
  if (!target) return;
  showFloatingDelta(target.id, delta);
  if (target.san) flashSanVignette();
}

function handleRollTag(t) {
  const parts = t.substring(5).split(",");
  if (parts.length < 4) return;
  pendingRoll = {
    round: story.variablesState["round_count"],
    skill: parts[0].trim(),
    value: parseInt(parts[1], 10),
    roll: parseInt(parts[2], 10),
    level: parseInt(parts[3], 10),
    outcome: ""
  };
}

function commitPendingRoll(outcome) {
  if (!pendingRoll) return;
  pendingRoll.outcome = outcome || "";
  rollLog.unshift(pendingRoll);
  pendingRoll = null;
  renderLog();
}

function continueStory() {
  while (story.canContinue) {
    const text = story.Continue().trim();
    const tags = story.currentTags || [];
    let speaker = null, scene = null, act = null;
    for (const t of tags) {
      if (t.startsWith("speaker:")) speaker = t.substring(8).trim();
      else if (t.startsWith("scene:")) scene = t.substring(6).trim();
      else if (t.startsWith("act:")) act = t.substring(4).trim();
      else if (t.startsWith("state:")) handleStateTag(t);
      else if (t.startsWith("roll:")) handleRollTag(t);
    }
    if (act && act !== lastAct) {
      appendParagraph(ACT_LABELS[act] || ("Act " + act), "act");
      lastAct = act;
    }
    if (scene && scene !== lastScene) {
      const label = SCENE_LABELS[scene] || scene;
      appendParagraph("〔" + label + "〕", "scene");
      lastScene = scene;
    }
    if (speaker && speaker !== lastSpeaker) {
      appendParagraph(SPEAKER_LABELS[speaker] || speaker, "speaker");
      lastSpeaker = speaker;
    }
    if (text) {
      const isDice = /^\[.+\]$/.test(text);
      const isEnd = tags.some(t => t.startsWith("CLASS:end") || t.startsWith("CLASS: end"));
      let cls = null;
      if (isEnd) cls = "end";
      else if (isDice) {
        cls = "dice";
        if (pendingRoll) {
          if (pendingRoll.level === 0) cls += " fumble";
          else if (pendingRoll.level === 5) cls += " crit";
          else if (pendingRoll.level === 1) cls += " fail";
        }
      }
      appendParagraph(text, cls);
      if (pendingRoll && !isDice) commitPendingRoll(text);
    }
    if (!speaker) lastSpeaker = null;
  }
  if (pendingRoll && pendingRoll.outcome === "") commitPendingRoll("");
  renderHUD();
  renderChoices();
}

function renderChoices() {
  choicesEl.innerHTML = "";
  if (story.currentChoices.length === 0) {
    const btn = document.createElement("button");
    btn.className = "restart";
    btn.textContent = "Restart";
    btn.onclick = () => restart();
    choicesEl.appendChild(btn);
    return;
  }
  story.currentChoices.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.textContent = choice.text;
    if (choice.text === "→") btn.classList.add("continue");
    btn.onclick = () => {
      story.ChooseChoiceIndex(i);
      lastSpeaker = null;
      continueStory();
    };
    choicesEl.appendChild(btn);
  });
}

function renderPanel() {
  document.getElementById("pc-name").textContent = PC_DATA.fullname + ' · "' + PC_DATA.name + '"';
  document.getElementById("pc-meta").textContent =
    PC_DATA.occupation + " · " + PC_DATA.age + " · " + PC_DATA.gender;

  const statsEl = document.getElementById("pc-stats");
  statsEl.innerHTML = "";
  for (const [k, v] of Object.entries(PC_DATA.stats)) {
    statsEl.insertAdjacentHTML("beforeend",
      '<div class="pair"><span>' + k + '</span><span>' + v + '</span></div>');
  }

  const v = story ? story.variablesState : {};
  const liveSAN = story ? v["san_xin"] : PC_DATA.derived.SAN_max;
  const liveHP = story ? v["hp_xin"] : PC_DATA.derived.HP_max;
  const derEl = document.getElementById("pc-derived");
  derEl.innerHTML = "";
  const rows = [
    ["HP", liveHP + " / " + PC_DATA.derived.HP_max, true],
    ["MP", PC_DATA.derived.MP_max + " / " + PC_DATA.derived.MP_max, false],
    ["SAN", liveSAN + " / " + PC_DATA.derived.SAN_max, true],
    ["Build", PC_DATA.derived.Build, false],
    ["DB", PC_DATA.derived.DB, false],
    ["MOV", PC_DATA.derived.MOV, false],
  ];
  rows.forEach(([k, val, live]) => {
    derEl.insertAdjacentHTML("beforeend",
      '<div class="pair' + (live ? ' live' : '') + '"><span>' + k + '</span><span>' + val + '</span></div>');
  });

  const skEl = document.getElementById("pc-skills");
  skEl.innerHTML = "";
  PC_DATA.skills.forEach(([name, val]) => {
    skEl.insertAdjacentHTML("beforeend",
      '<div class="row"><span>' + name + '</span><span>' + val + '</span></div>');
  });

  document.getElementById("pc-notes").textContent = PC_DATA.notes;

  renderCompanions();
}

function renderCompanions() {
  const el = document.getElementById("comp-list");
  el.innerHTML = "";
  const v = story ? story.variablesState : {};
  COMPANIONS.forEach((c) => {
    const fearVal = c.fearVar ? v[c.fearVar] : null;
    const trustVal = c.trustVar ? v[c.trustVar] : null;
    const meta = (fearVal !== null && fearVal !== undefined)
      ? "Fear " + fearVal + " · Trust " + trustVal
      : "—";
    const skillsHtml = c.skills.map(([n, s]) =>
      '<div class="row"><span>' + n + '</span><span>' + s + '</span></div>').join("");
    const statsHtml = Object.entries(c.stats).map(([k, val]) =>
      '<div class="pair"><span>' + k + '</span><span>' + val + '</span></div>').join("");
    const derivedHtml = Object.entries(c.derived).map(([k, val]) =>
      '<div class="pair"><span>' + k + '</span><span>' + val + '</span></div>').join("");
    el.insertAdjacentHTML("beforeend",
      '<details class="comp-card">' +
      '<summary><span class="name">' + c.name + ' · ' + c.role + '</span><span class="meta">' + meta + '</span></summary>' +
      '<div class="body">' +
      '<p style="color:var(--dim);font-size:12px;margin:0 0 8px">' + c.occupation + ' · ' + c.age + '</p>' +
      '<h3 style="margin-top:4px">Attributes</h3><div class="stats-grid">' + statsHtml + '</div>' +
      '<h3>Status</h3><div class="derived-grid">' + derivedHtml + '</div>' +
      '<h3>Skills</h3><div class="skills-list">' + skillsHtml + '</div>' +
      '<h3>Bio</h3><p style="font-size:13px;line-height:1.6">' + c.notes + '</p>' +
      '</div></details>');
  });
}

function renderLog() {
  if (rollLog.length === 0) {
    logListEl.innerHTML = '<div class="log-empty">No skill checks yet.</div>';
    return;
  }
  logListEl.innerHTML = "";
  rollLog.forEach(e => {
    const cls = LEVEL_CLASS[e.level] || "";
    const div = document.createElement("div");
    div.className = "log-entry " + (cls === "fumble" || cls === "crit" ? cls : "");
    const symbol = e.level === 0 ? "✗✗" :
                   e.level === 1 ? "✗" :
                   e.level === 5 ? "✓✓" : "✓";
    div.innerHTML =
      '<div class="head">' +
        '<span>[Round ' + e.round + ']</span>' +
        '<span class="res ' + cls + '">' + symbol + ' ' + LEVEL_NAMES[e.level] + '</span>' +
      '</div>' +
      '<div class="skill">' + escapeHTML(e.skill) + ' ' + e.value + ' · d' + e.roll + '</div>' +
      (e.outcome ? '<div class="outcome">' + escapeHTML(e.outcome) + '</div>' : '');
    logListEl.appendChild(div);
  });
}

function escapeHTML(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function openPanel() {
  renderPanel();
  renderLog();
  sheet.classList.add("open");
  scrim.classList.add("open");
}
function closePanel() {
  sheet.classList.remove("open");
  scrim.classList.remove("open");
}
document.getElementById("open-panel").onclick = openPanel;
scrim.onclick = closePanel;

document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    const target = btn.dataset.tab;
    document.getElementById("tab-stats").classList.toggle("hidden", target !== "stats");
    document.getElementById("tab-log").classList.toggle("hidden", target !== "log");
    document.getElementById("tab-comp").classList.toggle("hidden", target !== "comp");
  };
});

document.addEventListener("keydown", e => {
  if (e.key === "Escape" && sheet.classList.contains("open")) closePanel();
});

function restart() {
  story = new inkjs.Story(storyJson);
  storyEl.innerHTML = "";
  rollLog.length = 0;
  pendingRoll = null;
  lastScene = null; lastSpeaker = null; lastAct = null;
  continueStory();
}

async function main() {
  try {
    const resp = await fetch("kongjiang_act0_en.json");
    if (!resp.ok) throw new Error("Failed to load story: " + resp.status);
    storyJson = await resp.text();
    story = new inkjs.Story(storyJson);
    continueStory();
  } catch (e) {
    showError("Load failed: " + e.message);
    console.error(e);
  }
}
main();
</script>
</body>
</html>
