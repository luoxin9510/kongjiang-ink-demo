<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0B0B0E">
<title>Kongjiang Lockdown · Prologue</title>
<style>
:root {
  --bg: #0B0B0E;
  --fg: #E8E0CC;
  --dim: #8A8478;
  --accent: #B83A3A;
  --panel: #16161B;
  --panel-hover: #22222A;
  --border: #2A2A33;
}
* { box-sizing: border-box; }
html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--fg);
  font-family: "EB Garamond", "Iowan Old Style", "Palatino", Georgia, serif;
  font-size: 17px;
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
}
body {
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}
header.hud {
  flex: 0 0 auto;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  color: var(--dim);
  display: flex;
  flex-wrap: wrap;
  gap: 6px 14px;
  align-items: center;
  background: rgba(11, 11, 14, 0.95);
  backdrop-filter: blur(8px);
  position: sticky;
  top: 0;
  z-index: 10;
}
header.hud .stat { white-space: nowrap; }
header.hud .stat b { color: var(--fg); font-weight: 500; }
header.hud .stat.warn b { color: var(--accent); }
header.hud .lang {
  margin-left: auto;
  color: var(--dim);
  text-decoration: none;
  border: 1px solid var(--border);
  padding: 2px 8px;
  border-radius: 6px;
  font-size: 12px;
}
header.hud .lang:hover { color: var(--fg); border-color: var(--accent); }
main {
  flex: 1 1 auto;
  padding: 20px 18px 8px;
  max-width: 720px;
  width: 100%;
  margin: 0 auto;
}
#story p {
  margin: 0 0 1em 0;
  animation: fadeIn 0.6s ease-out;
}
#story p.speaker {
  color: var(--dim);
  font-size: 13px;
  margin-bottom: 0.2em;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
#story p.scene {
  color: var(--dim);
  font-size: 12px;
  font-style: italic;
  border-left: 2px solid var(--border);
  padding-left: 10px;
  margin: 1.2em 0 0.8em 0;
}
#story p.end {
  text-align: center;
  font-weight: 600;
  font-size: 19px;
  margin: 2em 0;
  letter-spacing: 0.15em;
  color: var(--accent);
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: none; }
}
nav#choices {
  flex: 0 0 auto;
  padding: 12px 18px calc(env(safe-area-inset-bottom) + 16px);
  max-width: 720px;
  width: 100%;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
  border-top: 1px solid var(--border);
  background: var(--bg);
}
nav#choices button {
  appearance: none;
  background: var(--panel);
  color: var(--fg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  font-family: inherit;
  font-size: 16px;
  line-height: 1.5;
  text-align: left;
  min-height: 48px;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
  -webkit-tap-highlight-color: transparent;
}
nav#choices button:active,
nav#choices button:hover {
  background: var(--panel-hover);
  border-color: var(--accent);
}
nav#choices.empty { display: none; }
nav#choices .restart {
  background: transparent;
  border-color: var(--accent);
  color: var(--accent);
  text-align: center;
}
.error {
  color: var(--accent);
  padding: 20px;
  text-align: center;
  font-size: 14px;
}
</style>
</head>
<body>

<header class="hud" id="hud">
  <span class="stat">SAN <b id="san">—</b></span>
  <span class="stat">Xin fear <b id="fear-xin">—</b></span>
  <span class="stat">Zhiyong <b id="fear-zy">—</b></span>
  <span class="stat">Zhangyi <b id="fear-zy2">—</b></span>
  <span class="stat">Round <b id="rounds">0</b></span>
  <a class="lang" href="../">中</a>
</header>

<main id="story" aria-live="polite"></main>

<nav id="choices"></nav>

<script src="https://unpkg.com/inkjs@2.3.1/dist/ink.js"></script>
<script>
const SPEAKER_LABELS = {
  player: "You",
  xin: "Xin",
  zhiyong: "Zhiyong",
  zhangyi: "Zhangyi",
  yanbo: "Yanbo",
};

const storyEl = document.getElementById("story");
const choicesEl = document.getElementById("choices");

function showError(msg) {
  storyEl.innerHTML = `<div class="error">${msg}</div>`;
}

function renderHUD(story) {
  const v = story.variablesState;
  document.getElementById("san").textContent = v["san_xin"];
  const setFear = (id, val) => {
    const el = document.getElementById(id);
    el.textContent = val;
    const stat = el.closest(".stat");
    if (val >= 50) stat.classList.add("warn");
    else stat.classList.remove("warn");
  };
  setFear("fear-xin", v["fear_xin"]);
  setFear("fear-zy", v["fear_zhiyong"]);
  setFear("fear-zy2", v["fear_zhangyi"]);
  document.getElementById("rounds").textContent = v["round_count"];
}

function appendParagraph(text, cls) {
  const p = document.createElement("p");
  if (cls) p.className = cls;
  p.textContent = text;
  storyEl.appendChild(p);
  p.scrollIntoView({ behavior: "smooth", block: "end" });
}

function processTags(tags) {
  let speaker = null, scene = null;
  for (const t of tags || []) {
    const [k, v] = t.split(":").map(s => s.trim());
    if (k === "speaker") speaker = SPEAKER_LABELS[v] || v;
    else if (k === "scene") scene = v;
  }
  return { speaker, scene };
}

let lastScene = null;
let lastSpeaker = null;

function continueStory(story) {
  while (story.canContinue) {
    const text = story.Continue().trim();
    const { speaker, scene } = processTags(story.currentTags);

    if (scene && scene !== lastScene) {
      appendParagraph(`〔${scene}〕`, "scene");
      lastScene = scene;
    }
    if (speaker && speaker !== lastSpeaker) {
      appendParagraph(speaker, "speaker");
      lastSpeaker = speaker;
    }
    if (text) {
      const isEnd = (story.currentTags || []).some(t => t.startsWith("CLASS:"));
      appendParagraph(text, isEnd ? "end" : null);
    }
    if (!speaker) lastSpeaker = null;
  }

  renderHUD(story);
  renderChoices(story);
}

function renderChoices(story) {
  choicesEl.innerHTML = "";
  if (story.currentChoices.length === 0) {
    const btn = document.createElement("button");
    btn.className = "restart";
    btn.textContent = "Restart";
    btn.onclick = () => location.reload();
    choicesEl.appendChild(btn);
    choicesEl.classList.remove("empty");
    return;
  }
  story.currentChoices.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.textContent = choice.text;
    btn.onclick = () => {
      story.ChooseChoiceIndex(i);
      lastSpeaker = null;
      continueStory(story);
    };
    choicesEl.appendChild(btn);
  });
  choicesEl.classList.remove("empty");
}

async function main() {
  try {
    const resp = await fetch("kongjiang_act0_en.json");
    if (!resp.ok) throw new Error(`Failed to load story: ${resp.status}`);
    const json = await resp.text();
    const story = new inkjs.Story(json);
    continueStory(story);
  } catch (e) {
    showError("Load failed: " + e.message);
    console.error(e);
  }
}

main();
</script>
</body>
</html>
